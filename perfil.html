<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Configuración</title>
</head>
<body class="bg-gray-900 text-white p-6">

    <div class="max-w-md mx-auto bg-gray-800 p-6 rounded-2xl shadow-xl">
        <!-- BOTÓN VOLVER -->
        <a href="index.html" class="flex items-center text-gray-400 hover:text-emerald-500 mb-4 transition-colors">
            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            <span class="text-xs font-bold">Volver</span>
        </a>

        <!-- TÍTULO CENTRADO -->
        <h2 class="text-xl font-bold mb-6 text-emerald-500 text-center">Configuración de Empresa</h2>

        <div class="mb-6 flex flex-col items-center">
            <div id="previewLogo" class="w-32 h-32 bg-gray-700 rounded-full mb-3 overflow-hidden border-2 border-emerald-500 flex items-center justify-center shadow-md">
                <span class="text-xs text-gray-400">Logo</span>
            </div>
            <label for="inputLogo" class="cursor-pointer bg-gray-700 hover:bg-gray-600 border border-gray-600 text-white text-xs font-bold px-4 py-2 rounded-lg transition-all active:scale-95 shadow">
                CARGAR LOGOTIPO
            </label>
            <input type="file" id="inputLogo" accept="image/*" onchange="cargarLogo(event)" class="hidden">
        </div>

        <div class="space-y-4">
            <!-- SELECTOR DE PAÍS -->
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1">País</label>
                <select id="paisUsuario" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-emerald-500">
                    <option value="VE">Venezuela</option>
                    <option value="CO">Colombia</option>
                    <option value="PE">Perú</option>
                    <option value="AR">Argentina</option>
                    <option value="EC">Ecuador</option>
                    <option value="PA">Panamá</option>
                    <option value="OTRO">Otro</option>
                </select>
            </div>

            <!-- CAMPO NOMBRE TASA PERSONALIZADO -->
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1">Nombre de la Tasa de Cambio</label>
                <input type="text" id="nombreTasa" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-sm focus:outline-none focus:border-emerald-500" placeholder="Ej: Tasa BCV, TRM, Tipo de Cambio...">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1">Nombre de la Empresa</label>
                <input type="text" id="nombreEmpresa" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-sm focus:outline-none focus:border-emerald-500">
            </div>

            <!-- IDENTIFICACIÓN FISCAL DINÁMICA -->
            <div>
                <label id="labelIdentificacion" class="block text-xs font-bold text-gray-400 mb-1">RIF / Identificación Fiscal</label>
                <input type="text" id="rifEmpresa" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-sm focus:outline-none focus:border-emerald-500">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1">Valor de la Tasa</label>
                <input type="number" id="tasaBCV" step="0.01" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-sm focus:outline-none focus:border-emerald-500">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1">Porcentaje de Impuesto (%)</label>
                <input type="number" id="porcentajeImpuesto" step="0.1" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-sm focus:outline-none focus:border-emerald-500">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1">Telefono (WhatsApp)</label>
                <input type="text" id="telefonoWhatsApp" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-sm focus:outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1">Dirección</label>
                <textarea id="direccionEmpresa" rows="2" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-sm focus:outline-none focus:border-emerald-500"></textarea>
            </div>
        </div>

        <button onclick="guardarConfiguracion()" class="w-full mt-6 bg-emerald-600 hover:bg-emerald-500 text-white py-3.5 rounded-xl font-bold text-sm shadow-lg shadow-emerald-900/20">
            GUARDAR CAMBIOS
        </button>
    </div>

    <script>
        const titulosFiscales = {
            'VE': 'RIF',
            'CO': 'NIT',
            'PE': 'RUC',
            'AR': 'CUIT / CUIL',
            'EC': 'RUC',
            'PA': 'RUC',
            'OTRO': 'Identificación Fiscal'
        };

        document.addEventListener('DOMContentLoaded', () => {
            // Cargar datos guardados
            document.getElementById('paisUsuario').value = localStorage.getItem('paisUsuario') || 'VE';
            document.getElementById('nombreTasa').value = localStorage.getItem('nombreTasa') || 'Tasa BCV';
            document.getElementById('nombreEmpresa').value = localStorage.getItem('nombreEmpresa') || '';
            document.getElementById('rifEmpresa').value = localStorage.getItem('rifEmpresa') || '';
            document.getElementById('tasaBCV').value = localStorage.getItem('tasaBCV') || '';
            document.getElementById('porcentajeImpuesto').value = localStorage.getItem('porcentajeImpuesto') || '16';
            document.getElementById('telefonoWhatsApp').value = localStorage.getItem('telefonoWhatsApp') || '';
            document.getElementById('direccionEmpresa').value = localStorage.getItem('direccionEmpresa') || '';
            
            // Actualizar label según país guardado
            const paisGuardado = document.getElementById('paisUsuario').value;
            document.getElementById('labelIdentificacion').innerText = titulosFiscales[paisGuardado] || 'Identificación Fiscal';

            const logoGuardado = localStorage.getItem('logoEmpresa');
            if (logoGuardado) {
                document.getElementById('previewLogo').innerHTML = `<img src="${logoGuardado}" class="w-full h-full object-cover">`;
            }
        });

        // Evento para cambiar el label al cambiar el país
        document.getElementById('paisUsuario').addEventListener('change', function() {
            document.getElementById('labelIdentificacion').innerText = titulosFiscales[this.value] || 'Identificación Fiscal';
        });

        function guardarConfiguracion() {
            localStorage.setItem('paisUsuario', document.getElementById('paisUsuario').value);
            localStorage.setItem('nombreTasa', document.getElementById('nombreTasa').value);
            localStorage.setItem('nombreEmpresa', document.getElementById('nombreEmpresa').value);
            localStorage.setItem('rifEmpresa', document.getElementById('rifEmpresa').value);
            localStorage.setItem('tasaBCV', document.getElementById('tasaBCV').value);
            localStorage.setItem('porcentajeImpuesto', document.getElementById('porcentajeImpuesto').value);
            localStorage.setItem('telefonoWhatsApp', document.getElementById('telefonoWhatsApp').value);
            localStorage.setItem('direccionEmpresa', document.getElementById('direccionEmpresa').value);

            alert("Configuración actualizada internacionalmente");
            window.location.href = 'index.html';
        }

        function cargarLogo(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem('logoEmpresa', e.target.result);
                    document.getElementById('previewLogo').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
