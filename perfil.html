<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Configuración</title>
</head>
<body class="bg-gray-900 text-white">

    <div class="bg-gray-900 p-6 min-h-screen">
        <a href="index.html" class="flex items-center text-gray-400 hover:text-emerald-500 mb-6 transition-colors text-sm font-semibold">← Volver</a>
        <h2 class="text-2xl font-bold mb-8 text-emerald-500 text-center">Configuración</h2>

        <div class="mb-8 pb-6 border-b border-gray-700">
            <h3 class="text-emerald-400 text-xs font-bold uppercase tracking-widest mb-5">Información de la Empresa</h3>
            
            <div class="flex flex-col items-center mb-6">
                <div id="previewLogo" class="w-24 h-24 bg-gray-800 rounded-full mb-3 overflow-hidden border-2 border-emerald-500 flex items-center justify-center">
                    <span class="text-xs text-gray-500">Logo</span>
                </div>
                <label for="inputLogo" class="cursor-pointer bg-gray-800 border border-gray-600 text-xs font-bold px-4 py-2 rounded-lg mt-2">CARGAR LOGOTIPO</label>
                <input type="file" id="inputLogo" accept="image/*" onchange="cargarLogo(event)" class="hidden">
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Nombre de la Empresa</label>
                    <input type="text" id="nombreEmpresa" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-base text-white outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Teléfono WhatsApp</label>
                    <input type="text" id="telefonoWhatsApp" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-base text-white outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Dirección</label>
                    <textarea id="direccionEmpresa" rows="2" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-base text-white outline-none focus:border-emerald-500"></textarea>
                </div>
            </div>
        </div>

        <div class="space-y-5 mb-10">
            <h3 class="text-emerald-400 text-xs font-bold uppercase tracking-widest mb-2">Datos Legales y Financieros</h3>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">País</label>
                <select id="paisUsuario" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-base text-white outline-none focus:border-emerald-500">
                    <option value="AR">Argentina</option>
                    <option value="BO">Bolivia</option>
                    <option value="CL">Chile</option>
                    <option value="CO">Colombia</option>
                    <option value="EC">Ecuador</option>
                    <option value="MX">México</option>
                    <option value="PA">Panamá</option>
                    <option value="PY">Paraguay</option>
                    <option value="PE">Perú</option>
                    <option value="VE">Venezuela</option>
                </select>
            </div>
            <div>
                <label id="labelIdentificacion" class="block text-sm font-medium text-gray-400 mb-1">RIF</label>
                <input type="text" id="rifEmpresa" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-base text-white outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Nombre de la Tasa</label>
                <input type="text" id="nombreTasa" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-base text-white outline-none focus:border-emerald-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Valor Tasa</label>
                    <input type="number" id="tasaBCV" step="0.01" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-base text-white outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Impuesto (%)</label>
                    <input type="number" id="porcentajeImpuesto" step="0.1" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-base text-white outline-none focus:border-emerald-500">
                </div>
            </div>
        </div>

        <button onclick="guardarConfiguracion()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg mb-8">GUARDAR CAMBIOS</button>
    </div>

    <script>
        const configuracionPaises = { 'VE': 'RIF', 'CO': 'NIT', 'PE': 'RUC', 'AR': 'CUIT / CUIL', 'EC': 'RUC', 'PA': 'RUC', 'CL': 'RUT', 'MX': 'RFC', 'BO': 'NIT', 'PY': 'RUC' };

        document.getElementById('paisUsuario').addEventListener('change', function() {
            document.getElementById('labelIdentificacion').innerText = configuracionPaises[this.value];
        });

        document.addEventListener('DOMContentLoaded', () => {
            const paisGuardado = localStorage.getItem('paisUsuario') || 'VE';
            document.getElementById('paisUsuario').value = paisGuardado;
            document.getElementById('labelIdentificacion').innerText = configuracionPaises[paisGuardado];
            
            // Carga de datos... (resto igual)
            document.getElementById('nombreTasa').value = localStorage.getItem('nombreTasa') || 'Tasa BCV';
            document.getElementById('nombreEmpresa').value = localStorage.getItem('nombreEmpresa') || '';
            document.getElementById('rifEmpresa').value = localStorage.getItem('rifEmpresa') || '';
            document.getElementById('tasaBCV').value = localStorage.getItem('tasaBCV') || '';
            document.getElementById('porcentajeImpuesto').value = localStorage.getItem('porcentajeImpuesto') || '16';
            document.getElementById('telefonoWhatsApp').value = localStorage.getItem('telefonoWhatsApp') || '';
            document.getElementById('direccionEmpresa').value = localStorage.getItem('direccionEmpresa') || '';
            
            const logo = localStorage.getItem('logoEmpresa');
            if(logo) document.getElementById('previewLogo').innerHTML = `<img src="${logo}" class="w-full h-full object-cover">`;
        });

        function guardarConfiguracion() {
            localStorage.setItem('paisUsuario', document.getElementById('paisUsuario').value);
            localStorage.setItem('nombreTasa', document.getElementById('nombreTasa').value);
            localStorage.setItem('nombreEmpresa', document.getElementById('nombreEmpresa').value);
            localStorage.setItem('rifEmpresa', document.getElementById('rifEmpresa').value);
            localStorage.setItem('tasaBCV', document.getElementById('tasaBCV').value);
            localStorage.setItem('porcentajeImpuesto', document.getElementById('porcentajeImpuesto').value);
            localStorage.setItem('telefonoWhatsApp', document.getElementById('telefonoWhatsApp').value);
            localStorage.setItem('direccionEmpresa', document.getElementById('direccionEmpresa').value);
            alert("¡Configuración guardada!");
            window.location.href = 'index.html';
        }

        function cargarLogo(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                localStorage.setItem('logoEmpresa', e.target.result);
                document.getElementById('previewLogo').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
            };
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
