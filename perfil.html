<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Configuración - PresuMetrick</title>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div class="p-4 max-w-md mx-auto w-full pb-24">
        <!-- Botón Volver -->
        <a href="index.html" class="flex items-center text-slate-400 hover:text-amber-500 transition-colors mb-6">
            <i class="fa-solid fa-arrow-left mr-2"></i> Volver
        </a>
        
        <h2 class="text-xl font-bold mb-6 text-amber-500 flex items-center">
            <i class="fa-solid fa-gear mr-2"></i> Configuración
        </h2>

        <!-- BLOQUE 1: INFORMACIÓN DE LA EMPRESA -->
        <div class="bg-slate-800/80 border border-slate-700/50 rounded-2xl p-5 shadow-xl mb-6">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-5 border-b border-slate-700 pb-2">Información de la Empresa</h3>
            
            <div class="flex flex-col items-center mb-6">
                <div id="previewLogo" class="w-24 h-24 bg-slate-900 rounded-full mb-3 overflow-hidden border-2 border-slate-700 flex items-center justify-center">
                    <span class="text-xs text-slate-500">Logo</span>
                </div>
                <label for="inputLogo" class="cursor-pointer bg-slate-900 border border-slate-700 text-xs font-bold px-4 py-2 rounded-xl mt-2 text-slate-300">CARGAR LOGOTIPO</label>
                <input type="file" id="inputLogo" accept="image/*" onchange="cargarLogo(event)" class="hidden">
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Nombre de la Empresa</label>
                    <input type="text" id="nombreEmpresa" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Teléfono WhatsApp</label>
                    <input type="text" id="telefonoWhatsApp" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Dirección</label>
                    <textarea id="direccionEmpresa" rows="2" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 transition-all"></textarea>
                </div>
            </div>
        </div>

        <!-- BLOQUE 2: DATOS LEGALES Y FINANCIEROS -->
        <div class="bg-slate-800/80 border border-slate-700/50 rounded-2xl p-5 shadow-xl mb-6">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-5 border-b border-slate-700 pb-2">Datos Legales y Financieros</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">País</label>
                    <select id="paisUsuario" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 transition-all">
                        <option value="AR">Argentina</option>
                        <option value="BO">Bolivia</option>
                        <option value="CL">Chile</option>
                        <option value="CO">Colombia</option>
                        <option value="EC">Ecuador</option>
                        <option value="MX">México</option>
                        <option value="PA">Panamá</option>
                        <option value="PY">Paraguay</option>
                        <option value="PE">Perú</option>
                        <option value="VE">Venezuela</option>
                    </select>
                </div>
                <div>
                    <label id="labelIdentificacion" class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">RIF</label>
                    <input type="text" id="rifEmpresa" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Valor Tasa</label>
                        <input type="number" id="tasaBCV" step="0.01" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Impuesto (%)</label>
                        <input type="number" id="porcentajeImpuesto" step="0.1" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 transition-all">
                    </div>
                </div>
            </div>
        </div>

        <button onclick="guardarConfiguracion()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-3.5 rounded-xl shadow-lg transition-all active:scale-[0.98] text-sm">
            GUARDAR CAMBIOS
        </button>
    </div>

    <script>
        const configuracionPaises = { 
            'VE': { id: 'RIF', tasaLabel: 'Equivalente a BCV' }, 
            'CO': { id: 'NIT', tasaLabel: 'Equivalente a TRM' }, 
            'PE': { id: 'RUC', tasaLabel: 'Equivalente a Tasa SBS' }, 
            'AR': { id: 'CUIT / CUIL', tasaLabel: 'Equivalente a Dólar Oficial' }, 
            'EC': { id: 'RUC', tasaLabel: 'Equivalente a Tasa de Cambio' }, 
            'PA': { id: 'RUC', tasaLabel: 'Equivalente a Tasa Local' }, 
            'CL': { id: 'RUT', tasaLabel: 'Equivalente a Dólar Observado' }, 
            'MX': { id: 'RFC', tasaLabel: 'Equivalente a Tasa Diario' }, 
            'BO': { id: 'NIT', tasaLabel: 'Equivalente a Tasa BCB' }, 
            'PY': { id: 'RUC', tasaLabel: 'Equivalente a Tasa BCP' } 
        };

        // Función para obtener la etiqueta automática
        function getEtiquetaTasa(paisCode) {
            return configuracionPaises[paisCode]?.tasaLabel || 'Equivalente a Tasa';
        }

        document.getElementById('paisUsuario').addEventListener('change', function() {
            const config = configuracionPaises[this.value];
            document.getElementById('labelIdentificacion').innerText = config.id;
        });

        document.addEventListener('DOMContentLoaded', () => {
            const paisGuardado = localStorage.getItem('paisUsuario') || 'VE';
            const config = configuracionPaises[paisGuardado];
            
            document.getElementById('paisUsuario').value = paisGuardado;
            document.getElementById('labelIdentificacion').innerText = config.id;
            
            document.getElementById('nombreEmpresa').value = localStorage.getItem('nombreEmpresa') || '';
            document.getElementById('rifEmpresa').value = localStorage.getItem('rifEmpresa') || '';
            document.getElementById('tasaBCV').value = localStorage.getItem('tasaBCV') || '';
            document.getElementById('porcentajeImpuesto').value = localStorage.getItem('porcentajeImpuesto') || '16';
            document.getElementById('telefonoWhatsApp').value = localStorage.getItem('telefonoWhatsApp') || '';
            document.getElementById('direccionEmpresa').value = localStorage.getItem('direccionEmpresa') || '';
            
            const logo = localStorage.getItem('logoEmpresa');
            if(logo) document.getElementById('previewLogo').innerHTML = `<img src="${logo}" class="w-full h-full object-cover">`;
        });

        function guardarConfiguracion() {
            localStorage.setItem('paisUsuario', document.getElementById('paisUsuario').value);
            localStorage.setItem('nombreEmpresa', document.getElementById('nombreEmpresa').value);
            localStorage.setItem('rifEmpresa', document.getElementById('rifEmpresa').value);
            localStorage.setItem('tasaBCV', document.getElementById('tasaBCV').value);
            localStorage.setItem('porcentajeImpuesto', document.getElementById('porcentajeImpuesto').value);
            localStorage.setItem('telefonoWhatsApp', document.getElementById('telefonoWhatsApp').value);
            localStorage.setItem('direccionEmpresa', document.getElementById('direccionEmpresa').value);
            alert("¡Configuración guardada!");
            window.location.href = 'index.html';
        }

        function cargarLogo(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                localStorage.setItem('logoEmpresa', e.target.result);
                document.getElementById('previewLogo').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
            };
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
