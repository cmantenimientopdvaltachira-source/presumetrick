<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Configuración</title>
</head>
<body class="bg-gray-900 text-white p-6">

    <div class="max-w-md mx-auto bg-gray-800 p-6 rounded-2xl shadow-xl">
        <a href="index.html" class="flex items-center text-gray-400 hover:text-emerald-500 mb-4 transition-colors text-xs font-bold">← Volver</a>
        <h2 class="text-xl font-bold mb-6 text-emerald-500 text-center">Configuración</h2>

        <!-- BLOQUE 1: IDENTIDAD COMERCIAL (Logo, Nombre, Teléfono, Dirección) -->
        <div class="mb-6 pb-6 border-b border-gray-700">
            <h3 class="text-emerald-500 text-[10px] font-bold uppercase mb-4">Información de la Empresa</h3>
            <div class="flex flex-col items-center mb-4">
                <div id="previewLogo" class="w-20 h-20 bg-gray-700 rounded-full mb-2 overflow-hidden border-2 border-emerald-500 flex items-center justify-center">
                    <span class="text-[9px] text-gray-500">Logo</span>
                </div>
                <label for="inputLogo" class="cursor-pointer bg-gray-700 border border-gray-600 text-[10px] font-bold px-3 py-1.5 rounded-lg">CARGAR LOGOTIPO</label>
                <input type="file" id="inputLogo" accept="image/*" onchange="cargarLogo(event)" class="hidden">
            </div>
            <div class="space-y-3">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1">Nombre de la Empresa</label>
                    <input type="text" id="nombreEmpresa" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-sm outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1">Teléfono WhatsApp</label>
                    <input type="text" id="telefonoWhatsApp" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-sm outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1">Dirección</label>
                    <textarea id="direccionEmpresa" rows="2" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-sm outline-none focus:border-emerald-500"></textarea>
                </div>
            </div>
        </div>

        <!-- BLOQUE 2: LEGAL Y FINANCIERO (País, RIF/NIT/RUC, Tasa, Impuesto) -->
        <div class="space-y-3">
            <h3 class="text-emerald-500 text-[10px] font-bold uppercase mb-2">Datos Legales y Financieros</h3>
            <div>
                <label class="block text-[10px] font-bold text-gray-400 mb-1">País</label>
                <select id="paisUsuario" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-sm outline-none focus:border-emerald-500">
                    <option value="VE">Venezuela</option>
                    <option value="CO">Colombia</option>
                    <option value="PE">Perú</option>
                    <option value="AR">Argentina</option>
                    <option value="EC">Ecuador</option>
                    <option value="PA">Panamá</option>
                    <option value="CL">Chile</option>
                    <option value="MX">México</option>
                    <option value="BO">Bolivia</option>
                    <option value="PY">Paraguay</option>
                </select>
            </div>
            <div>
                <label id="labelIdentificacion" class="block text-[10px] font-bold text-gray-400 mb-1">RIF</label>
                <input type="text" id="rifEmpresa" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-sm outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-400 mb-1">Nombre de la Tasa</label>
                <input type="text" id="nombreTasa" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-sm outline-none focus:border-emerald-500">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1">Valor Tasa</label>
                    <input type="number" id="tasaBCV" step="0.01" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-sm outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1">Impuesto (%)</label>
                    <input type="number" id="porcentajeImpuesto" step="0.1" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-sm outline-none focus:border-emerald-500">
                </div>
            </div>
        </div>

        <button onclick="guardarConfiguracion()" class="w-full mt-8 bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-bold text-sm shadow-lg">GUARDAR CAMBIOS</button>
    </div>

    <script>
        const configuracionPaises = { 'VE': 'RIF', 'CO': 'NIT', 'PE': 'RUC', 'AR': 'CUIT / CUIL', 'EC': 'RUC', 'PA': 'RUC', 'CL': 'RUT', 'MX': 'RFC', 'BO': 'NIT', 'PY': 'RUC' };

        document.getElementById('paisUsuario').addEventListener('change', function() {
            document.getElementById('labelIdentificacion').innerText = configuracionPaises[this.value];
        });

        document.addEventListener('DOMContentLoaded', () => {
            const paisGuardado = localStorage.getItem('paisUsuario') || 'VE';
            document.getElementById('paisUsuario').value = paisGuardado;
            document.getElementById('labelIdentificacion').innerText = configuracionPaises[paisGuardado];
            
            document.getElementById('nombreTasa').value = localStorage.getItem('nombreTasa') || 'Tasa BCV';
            document.getElementById('nombreEmpresa').value = localStorage.getItem('nombreEmpresa') || '';
            document.getElementById('rifEmpresa').value = localStorage.getItem('rifEmpresa') || '';
            document.getElementById('tasaBCV').value = localStorage.getItem('tasaBCV') || '';
            document.getElementById('porcentajeImpuesto').value = localStorage.getItem('porcentajeImpuesto') || '16';
            document.getElementById('telefonoWhatsApp').value = localStorage.getItem('telefonoWhatsApp') || '';
            document.getElementById('direccionEmpresa').value = localStorage.getItem('direccionEmpresa') || '';
            
            const logo = localStorage.getItem('logoEmpresa');
            if(logo) document.getElementById('previewLogo').innerHTML = `<img src="${logo}" class="w-full h-full object-cover">`;
        });

        function guardarConfiguracion() {
            localStorage.setItem('paisUsuario', document.getElementById('paisUsuario').value);
            localStorage.setItem('nombreTasa', document.getElementById('nombreTasa').value);
            localStorage.setItem('nombreEmpresa', document.getElementById('nombreEmpresa').value);
            localStorage.setItem('rifEmpresa', document.getElementById('rifEmpresa').value);
            localStorage.setItem('tasaBCV', document.getElementById('tasaBCV').value);
            localStorage.setItem('porcentajeImpuesto', document.getElementById('porcentajeImpuesto').value);
            localStorage.setItem('telefonoWhatsApp', document.getElementById('telefonoWhatsApp').value);
            localStorage.setItem('direccionEmpresa', document.getElementById('direccionEmpresa').value);
            alert("¡Configuración guardada!");
            window.location.href = 'index.html';
        }

        function cargarLogo(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                localStorage.setItem('logoEmpresa', e.target.result);
                document.getElementById('previewLogo').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
            };
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
