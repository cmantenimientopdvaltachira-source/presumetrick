<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motores Eléctricos - PresuMetrick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d1322; color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="min-h-screen pb-28">

    <!-- Header Superior -->
    <header class="bg-[#111827] border-b border-gray-800 p-4 sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <a href="index.html" class="text-gray-400 hover:text-white text-lg"><i class="fa-solid fa-arrow-left"></i></a>
            <h1 class="text-lg font-bold text-amber-500 flex items-center gap-2">
                <i class="fa-solid fa-gears"></i> Motores Eléctricos
            </h1>
        </div>
        <div class="bg-amber-500/20 text-amber-400 border border-amber-500/30 text-xs font-semibold px-3 py-1 rounded-full shadow">
            Módulo Activo
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="max-w-xl mx-auto p-4 space-y-4">
        
        <!-- Tarjeta de Instrucción -->
        <div class="bg-[#161f31] border border-gray-800 rounded-xl p-4 text-sm text-gray-300">
            Selecciona el equipo y la actividad para registrar el servicio técnico.
        </div>

        <!-- Formulario Nueva Partida -->
        <div class="bg-[#161f31] border border-gray-800 rounded-2xl p-5 shadow-lg space-y-4">
            <div class="flex items-center space-x-2 text-amber-500 font-semibold border-b border-gray-800 pb-2">
                <i class="fa-solid fa-calculator"></i>
                <span>Nueva Partida</span>
            </div>

            <!-- Equipo -->
            <div>
                <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1 font-semibold">Equipo</label>
                <select id="equipo" class="w-full bg-[#0d1322] border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-amber-500">
                    <option value="">Seleccione un equipo...</option>
                    <option value="Motor Eléctrico Baja Tensión">Motor Eléctrico Baja Tensión</option>
                    <option value="Motor Eléctrico Mediana Tensión">Motor Eléctrico Mediana Tensión</option>
                    <option value="Motor de Alta Tensión">Motor de Alta Tensión</option>
                    <option value="Motor Trifásico Especial">Motor Trifásico Especial</option>
                    <option value="Motor Monofásico">Motor Monofásico</option>
                    <option value="Motor de Corriente Continua (CC)">Motor de Corriente Continua (CC)</option>
                    <option value="Motor a Prueba de Explosión / Antideflagrante">Motor a Prueba de Explosión / Antideflagrante</option>
                    <option value="Motor de Anillos Rozantes">Motor de Anillos Rozantes</option>
                    <option value="Motor con Freno Electromagnético">Motor con Freno Electromagnético</option>
                    <option value="Motor para Aplicaciones Específicas">Motor para Aplicaciones Específicas (Bombas, Ventiladores, Transportadores)</option>
                </select>
            </div>

            <!-- Servicio / Acción -->
            <div>
                <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1 font-semibold">Servicio / Acción</label>
                <select id="servicio" class="w-full bg-[#0d1322] border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-amber-500">
                    <option value="">Seleccione una acción...</option>
                    <option value="Mantenimiento preventivo integral (Limpieza, rodamientos y pruebas)">Mantenimiento preventivo integral (Limpieza, rodamientos y pruebas)</option>
                    <option value="Rebobinado de estator por quemadura">Rebobinado de estator por quemadura</option>
                    <option value="Rebobinado de rotor">Rebobinado de rotor</option>
                    <option value="Balanceo dinámico de rotor">Balanceo dinámico de rotor</option>
                    <option value="Cambio de rodamientos">Cambio de rodamientos</option>
                    <option value="Pruebas dinámicas y de aislamiento (Megger)">Pruebas dinámicas y de aislamiento (Megger)</option>
                    <option value="Corrección de alineación y bancada">Corrección de alineación y bancada</option>
                    <option value="Reparación / cambio de caja de bornes y conexiones">Reparación / cambio de caja de bornes y conexiones</option>
                    <option value="Reacondicionamiento o cambio de eje, chavetas y acoplamientos">Reacondicionamiento o cambio de eje, chavetas y acoplamientos</option>
                    <option value="Cambio de sellos, empaques y sistemas de lubricación">Cambio de sellos, empaques y sistemas de lubricación</option>
                    <option value="Cambio / ajuste de frenos electromagnéticos">Cambio / ajuste de frenos electromagnéticos</option>
                    <option value="Análisis de vibraciones y termografía predictiva">Análisis de vibraciones y termografía predictiva</option>
                    <option value="Limpieza y tratamiento de aislamiento">Limpieza y tratamiento de aislamiento</option>
                    <option value="Ajuste y cambio de sistemas de arranque y protección">Ajuste y cambio de sistemas de arranque y protección</option>
                    <option value="Instalación y puesta en marcha del equipo">Instalación y puesta en marcha del equipo</option>
                </select>
            </div>

            <!-- Especificaciones -->
            <div>
                <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1 font-semibold">Especificaciones</label>
                <input type="text" id="especificaciones" placeholder="Ej: 50 HP / 440V / 1750 RPM" class="w-full bg-[#0d1322] border border-gray-700 rounded-xl p-3 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500">
            </div>

            <!-- Cantidad y Precio Unitario -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1 font-semibold">Cantidad</label>
                    <input type="number" id="cantidad-input" min="1" placeholder="0" class="w-full bg-[#0d1322] border border-gray-700 rounded-xl p-3 text-white text-center focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1 font-semibold">Precio Unitario ($)</label>
                    <input type="number" id="precio-input" step="0.01" placeholder="0.00" class="w-full bg-[#0d1322] border border-gray-700 rounded-xl p-3 text-white text-center focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <!-- Botón Agregar -->
            <button type="button" onclick="guardarPartida()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold p-3.5 rounded-xl transition shadow-md flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> Agregar al Presupuesto
            </button>
        </div>

    </main>

    <!-- Barra Inferior de Acciones -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#111827] border-t border-gray-800 p-3 flex items-center justify-around z-50">
        <a href="index.html" class="flex flex-col items-center text-gray-400 hover:text-amber-500 text-xs">
            <i class="fa-solid fa-house text-lg"></i>
            <span>Panel</span>
        </a>
        <a href="#" class="flex flex-col items-center text-amber-500 text-xs font-semibold">
            <i class="fa-solid fa-gears text-lg"></i>
            <span>Mot. Eléc.</span>
        </a>
        <a href="perfil.html" class="flex flex-col items-center text-gray-400 hover:text-amber-500 text-xs">
            <i class="fa-solid fa-gear text-lg"></i>
            <span>Config</span>
        </a>
    </nav>

    <!-- Script idéntico al de Refrigeración -->
    <script>
        function guardarPartida() {
            const equipo = document.getElementById('equipo').value;
            const servicio = document.getElementById('servicio').value;
            const specs = document.getElementById('especificaciones').value;
            
            const cantidad = parseFloat(document.getElementById('cantidad-input').value);
            const precioUnitario = parseFloat(document.getElementById('precio-input').value);

            if (!equipo || !servicio || isNaN(cantidad) || cantidad <= 0 || isNaN(precioUnitario) || precioUnitario <= 0) {
                alert('Por favor, completa los campos requeridos, cantidad y precio unitario válidos.');
                return;
            }

            const nuevaPartida = {
                modulo: 'MOTORES ELÉCTRICOS',
                equipo: equipo,
                especificaciones: specs,
                servicio: servicio,
                cantidad: cantidad,
                unidad: 'und',
                precioUnitario: precioUnitario,
                totalUSD: cantidad * precioUnitario
            };

            let presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
            presupuesto.push(nuevaPartida);
            localStorage.setItem('presupuestoActual', JSON.stringify(presupuesto));

            document.getElementById('cantidad-input').value = "";
            document.getElementById('precio-input').value = "";
            document.getElementById('especificaciones').value = "";
            document.getElementById('equipo').value = "";
            document.getElementById('servicio').value = "";

            alert('¡Partida de Motores Eléctricos agregada con éxito!');
        }
    </script>
</body>
</html>
