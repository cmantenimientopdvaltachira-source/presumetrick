<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresuMetrick - Electricidad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans selection:bg-amber-500 selection:text-slate-900">

    <header class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-800 px-4 py-4 flex items-center justify-between shadow-lg">
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-slate-400 hover:text-amber-500 transition-colors p-1">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </a>
            <h1 class="text-xl font-bold tracking-tight text-amber-500">
                <i class="fa-solid fa-bolt mr-1"></i> Electricidad
            </h1>
        </div>
        <span class="bg-amber-500/10 text-amber-500 text-xs font-semibold px-2.5 py-1 rounded-full border border-amber-500/20">
            Módulo Activo
        </span>
    </header>

    <main class="flex-1 p-4 max-w-md mx-auto w-full space-y-6 pb-24">
        
        <div class="bg-slate-800/50 border border-slate-800 rounded-2xl p-4 shadow-md">
            <p class="text-sm text-slate-400 leading-relaxed">
                Registra los puntos eléctricos, tableros o metros de cableado para generar el cómputo métrico automáticamente.
            </p>
        </div>

        <div class="bg-slate-800/80 border border-slate-700/50 rounded-2xl p-5 shadow-xl space-y-4">
            <h2 class="text-base font-semibold text-slate-200 border-b border-slate-700 pb-2">
                <i class="fa-solid fa-calculator text-amber-500 mr-2"></i>Nuevo Concepto
            </h2>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Tipo de Trabajo</label>
                <select class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
                    <option>Punto de Iluminación</option>
                    <option>Punto de Tomacorriente 110V / 220V</option>
                    <option>Acometida / Cableado</option>
                    <option>Instalación de Tablero Principal</option>
                    <option>Balanceo de Cargas / Revisión</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Cantidad</label>
                    <input type="number" placeholder="0" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
                </div>
                <div class="space-y-1.5">
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Unidad</label>
                    <select class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 transition-all">
                        <option>Pto (Punto)</option>
                        <option>Mtrs (Metros)</option>
                        <option>Glob (Global)</option>
                        <option>Und (Unidad)</option>
                    </select>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Precio Unitario ($)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 text-sm">$</span>
                    <input type="number" step="0.01" placeholder="0.00" class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-8 pr-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Descripción o Notas</label>
                <textarea rows="2" placeholder="Ej: Cable THW #12, incluye cajetín plástico..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all resize-none"></textarea>
            </div>

            <button type="button" onclick="guardarPartida()"  class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-amber-500/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2 text-sm">
                <i class="fa-solid fa-plus text-base"></i> Agregar al Presupuesto
            </button>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur-md border-t border-slate-800 px-6 py-2 shadow-2xl">
        <div class="max-w-md mx-auto flex justify-between items-center text-center">
            <a href="index.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-amber-500 transition-colors py-1 px-3">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px] font-medium tracking-wide">Panel</span>
            </a>
            <div class="flex flex-col items-center gap-1 text-amber-500 py-1 px-3 border-b-2 border-amber-500">
                <i class="fa-solid fa-bolt text-lg"></i>
                <span class="text-[10px] font-bold tracking-wide">Cómputo</span>
            </div>
            <a href="perfil.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-amber-500 transition-colors py-1 px-3">
                <i class="fa-solid fa-gear text-lg"></i>
                <span class="text-[10px] font-medium tracking-wide">Config</span>
            </a>
        </div>
    </nav>

<script>
document.addEventListener('DOMContentLoaded', () => {
    if (!localStorage.getItem('presupuestoActual')) {
        localStorage.setItem('presupuestoActual', JSON.stringify([]));
    }
});

function guardarPartida() {
    // Captura de datos de los elementos de la interfaz
    const tipoTrabajo = document.querySelector('select').value; 
    const inputs = document.querySelectorAll('input');
    const cantidad = parseFloat(inputs[0].value) || 0;
    const precioUnitario = parseFloat(inputs[1].value) || 0;
    const descripcionAdicional = document.querySelector('textarea').value;

    // Validación para que no metan datos vacíos o en cero
    if (cantidad <= 0 || precioUnitario <= 0) {
        alert('Por favor, ingresa una cantidad y un precio unitario válidos.');
        return;
    }

    // Cálculo del total de esta partida
    const totalUSD = cantidad * precioUnitario;

    // Estructura de la nueva partida para el Presupuesto
    const nuevaPartida = {
        modulo: 'Electricidad',
        trabajo: tipoTrabajo,
        cantidad: cantidad,
        unidad: document.querySelectorAll('select')[0].value, // Usa el tipo de unidad seleccionado
        precioUnitario: precioUnitario,
        totalUSD: totalUSD,
        nota: descripcionAdicional
    };

    // Manejo del LocalStorage (Reemplaza tus líneas 134 a 142 con esto)
    let presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
    presupuesto.push(nuevaPartida);
    localStorage.setItem('presupuestoActual', JSON.stringify(presupuesto));

    // Limpieza de los campos del formulario tras guardar
    inputs[0].value = "";
    inputs[1].value = "";
    document.querySelector('textarea').value = "";

    // Notificación de éxito
    alert('¡Partida agregada al presupuesto con éxito!');
}
</script>


</body>
</html>
