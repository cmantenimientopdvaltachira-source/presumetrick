<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresuMetrick - Plomería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans selection:bg-blue-500 selection:text-slate-900">

    <header class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-800 px-4 py-4 flex items-center justify-between shadow-lg">
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-slate-400 hover:text-blue-500 transition-colors p-1">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </a>
            <h1 class="text-xl font-bold tracking-tight text-blue-500">
                <i class="fa-solid fa-faucet mr-1"></i> Plomería
            </h1>
        </div>
        <span class="bg-blue-500/10 text-blue-500 text-xs font-semibold px-2.5 py-1 rounded-full border border-blue-500/20">
            Módulo Activo
        </span>
    </header>

    <main class="flex-1 p-4 max-w-md mx-auto w-full space-y-6 pb-24">
        
        <div class="bg-slate-800/50 border border-slate-800 rounded-2xl p-4 shadow-md">
            <p class="text-sm text-slate-400 leading-relaxed">
                Registra trabajos de tuberías, sanitarios o reparaciones para generar el cómputo métrico automáticamente.
            </p>
        </div>

        <div class="bg-slate-800/80 border border-slate-700/50 rounded-2xl p-5 shadow-xl space-y-4">
            <h2 class="text-base font-semibold text-slate-200 border-b border-slate-700 pb-2">
                <i class="fa-solid fa-calculator text-blue-500 mr-2"></i>Nuevo Concepto
            </h2>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Tipo de Trabajo</label>
                <select id="tipo-trabajo" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                    <option>Reparación de Fuga de Agua</option>
                    <option>Instalación de Grifería</option>
                    <option>Destape de Cañerías</option>
                    <option>Instalación de Sanitario / Inodoro</option>
                    <option>Instalación de Lavamanos / Fregadero</option>
                    <option>Montaje de Tuberías (PVC/PPR)</option>
                    <option>Mantenimiento de Tanque</option>
                    <option>Instalación de Bomba de Agua</option>
                    <option>Revisión General de Instalaciones</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Cantidad</label>
                    <input type="number" id="cantidad-input" step="0.01" placeholder="0" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>
                <div class="space-y-1.5">
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Unidad</label>
                    <select id="unidad-select" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                        <option>und</option>
                        <option>mts</option>
                        <option>pto</option>
                        <option>glob</option>
                    </select>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Precio Unitario ($)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 text-sm">$</span>
                    <input type="number" id="precio-input" step="0.01" placeholder="0.00" class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-8 pr-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>
            </div>

            <button type="button" onclick="guardarPartida()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-500/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2 text-sm">
                <i class="fa-solid fa-plus text-base"></i> Agregar al Presupuesto
            </button>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur-md border-t border-slate-800 px-6 py-2 shadow-2xl">
        <div class="max-w-md mx-auto flex justify-between items-center text-center">
            <a href="index.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-500 transition-colors py-1 px-3">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px] font-medium tracking-wide">Panel</span>
            </a>
            <div class="flex flex-col items-center gap-1 text-blue-500 py-1 px-3 border-b-2 border-blue-500">
                <i class="fa-solid fa-faucet text-lg"></i>
                <span class="text-[10px] font-bold tracking-wide">Plomería</span>
            </div>
            <a href="perfil.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-500 transition-colors py-1 px-3">
                <i class="fa-solid fa-gear text-lg"></i>
                <span class="text-[10px] font-medium tracking-wide">Config</span>
            </a>
        </div>
    </nav>

<script>
function guardarPartida() {
    const tipoTrabajo = document.getElementById('tipo-trabajo').value; 
    const cantidad = parseFloat(document.getElementById('cantidad-input').value) || 0;
    const precioUnitario = parseFloat(document.getElementById('precio-input').value) || 0;
    const unidadSeleccionada = document.getElementById('unidad-select').value; // Nueva línea

    if (cantidad <= 0 || precioUnitario <= 0) {
        alert('Por favor, ingresa una cantidad y un precio unitario válidos.');
        return;
    }

    const nuevaPartida = {
        modulo: 'PLOMERÍA',
        equipo: 'N/A',
        especificaciones: 'N/A',
        servicio: tipoTrabajo,
        cantidad: cantidad,
        unidad: unidadSeleccionada, // Nueva línea
        precioUnitario: precioUnitario,
        totalUSD: cantidad * precioUnitario
    };

    let presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
    presupuesto.push(nuevaPartida);
    localStorage.setItem('presupuestoActual', JSON.stringify(presupuesto));

    document.getElementById('cantidad-input').value = "";
    document.getElementById('precio-input').value = "";

    alert('¡Partida de Plomería agregada con éxito!');
}

</script>
</body>
</html>
