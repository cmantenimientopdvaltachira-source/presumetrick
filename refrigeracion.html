<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresuMetrick - Refrigeración</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans">

    <header class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-800 px-4 py-4 flex items-center justify-between shadow-lg">
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-slate-400 hover:text-amber-500 transition-colors p-1">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </a>
            <h1 class="text-xl font-bold tracking-tight text-amber-500"><i class="fa-solid fa-snowflake mr-1"></i> Refrigeración</h1>
        </div>
    </header>

    <main class="flex-1 p-4 max-w-md mx-auto w-full space-y-6 pb-24">
        <div class="bg-slate-800/80 border border-slate-700/50 rounded-2xl p-5 shadow-xl space-y-4">
            <h2 class="text-base font-semibold text-slate-200 border-b border-slate-700 pb-2">Nuevo Concepto</h2>

            <!-- Selector con Títulos Deshabilitados para máxima alineación -->
            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase">Tipo de Trabajo</label>
                <select id="tipo-trabajo" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500">
                    <option disabled class="text-amber-500 font-bold bg-slate-800">--- INSTALACIÓN ---</option>
                    <option value="Instalación: Split / Ventana">Instalación: Split / Ventana</option>
                    <option value="Instalación: Piso-Techo">Instalación: Piso-Techo</option>
                    <option value="Instalación: Compacto">Instalación: Compacto</option>
                    <option value="Instalación: Chiller / Industrial">Instalación: Chiller / Industrial</option>
                    <option value="Instalación: Vitrina Comercial">Instalación: Vitrina Comercial</option>
                    
                    <option disabled class="text-amber-500 font-bold bg-slate-800">--- MANTENIMIENTO ---</option>
                    <option value="Mant. Preventivo">Mant. Preventivo</option>
                    <option value="Mant. Correctivo">Mant. Correctivo</option>
                    
                    <option disabled class="text-amber-500 font-bold bg-slate-800">--- SERVICIOS ESPECIALIZADOS ---</option>
                    <option value="Reparación de Fugas">Reparación de Fugas</option>
                    <option value="Barrido con Nitrógeno">Barrido con Nitrógeno</option>
                    <option value="Lavado Químico">Lavado Químico</option>
                    <option value="Vacío y Carga de Gas">Vacío y Carga de Gas</option>
                    <option value="Cambio de Compresor">Cambio de Compresor</option>
                </select>
            </div>

            <!-- Campo de Especificación Técnica: BTU / KG -->
            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-amber-500 uppercase tracking-wider">Especificaciones de BTU y Kilogramos</label>
                <input type="text" id="detalle-input" placeholder="Ej: 24.000 BTU o 1.5 KG" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:border-amber-500 outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="block text-xs font-medium text-slate-400 uppercase">Cantidad</label>
                    <input type="number" id="cantidad-input" step="0.01" placeholder="0" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:border-amber-500 outline-none">
                </div>
                <div class="space-y-1.5">
                    <label class="block text-xs font-medium text-slate-400 uppercase">Unidad</label>
                    <select id="unidad-select" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:border-amber-500 outline-none">
                        <option>Und</option>
                        <option>BTU</option>
                        <option>KG</option>
                        <option>Mtrs</option>
                        <option>Serv</option>
                        <option>Glob</option>
                    </select>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase">Precio Unitario ($)</label>
                <input type="number" id="precio-input" step="0.01" placeholder="0.00" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:border-amber-500 outline-none">
            </div>

            <button type="button" onclick="guardarPartida()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-3.5 rounded-xl transition-all">
                Agregar al Presupuesto
            </button>
        </div>
    </main>

    <script>
        function guardarPartida() {
            const selectElement = document.getElementById('tipo-trabajo');
            const tipoTrabajo = selectElement.value;
            const detalle = document.getElementById('detalle-input').value;
            const cantidad = parseFloat(document.getElementById('cantidad-input').value) || 0;
            const precioUnitario = parseFloat(document.getElementById('precio-input').value) || 0;
            const unidad = document.getElementById('unidad-select').value;

            // Validación de seguridad para no permitir seleccionar los títulos
            if (selectElement.options[selectElement.selectedIndex].disabled) {
                alert('Por favor, selecciona un trabajo válido.');
                return;
            }
            if (!tipoTrabajo || cantidad <= 0 || precioUnitario <= 0) {
                alert('Por favor, verifica que todos los campos estén completos y válidos.');
                return;
            }

            // Concatenación inteligente: Tipo de trabajo + (Detalle Técnico)
            const descripcionFinal = detalle ? `${tipoTrabajo} (${detalle})` : tipoTrabajo;

            const nuevaPartida = {
                modulo: 'Refrigeración',
                trabajo: descripcionFinal,
                cantidad: cantidad,
                unidad: unidad,
                precioUnitario: precioUnitario,
                totalUSD: cantidad * precioUnitario
            };

            let presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
            presupuesto.push(nuevaPartida);
            localStorage.setItem('presupuestoActual', JSON.stringify(presupuesto));

            alert('¡Partida agregada con éxito!');
            
            // Limpieza de campos para la siguiente carga
            document.getElementById('detalle-input').value = "";
            document.getElementById('cantidad-input').value = "";
            document.getElementById('precio-input').value = "";
        }
    </script>
</body>
</html>
