<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresuMetrick - Refrigeración</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans selection:bg-amber-500 selection:text-slate-900">

    <header class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-800 px-4 py-4 flex items-center justify-between shadow-lg">
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-slate-400 hover:text-amber-500 transition-colors p-1">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </a>
            <h1 class="text-xl font-bold tracking-tight text-amber-500">
                <i class="fa-solid fa-snowflake mr-1"></i> Refrigeración
            </h1>
        </div>
        <span class="bg-amber-500/10 text-amber-500 text-xs font-semibold px-2.5 py-1 rounded-full border border-amber-500/20">
            Módulo Activo
        </span>
    </header>

    <main class="flex-1 p-4 max-w-md mx-auto w-full space-y-6 pb-24">
        
        <div class="bg-slate-800/50 border border-slate-800 rounded-2xl p-4 shadow-md">
            <p class="text-sm text-slate-400 leading-relaxed">
                Selecciona el equipo y la actividad para registrar el servicio técnico.
            </p>
        </div>

        <div class="bg-slate-800/80 border border-slate-700/50 rounded-2xl p-5 shadow-xl space-y-4">
            <h2 class="text-base font-semibold text-slate-200 border-b border-slate-700 pb-2">
                <i class="fa-solid fa-calculator text-amber-500 mr-2"></i>Nueva Partida
            </h2>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Equipo</label>
                <select id="equipo" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200">
                    <option>Aire Acondicionado Split</option>
                    <option>Aire Acondicionado Piso Techo</option>
                    <option>Aire Acondicionado de Ventana</option>
                    <option>Aire Acondicionado Compacto</option>
                    <option>Chiller</option>
                    <option>Nevera / Congelador</option>
                    <option>Cuarto Frío / Cava</option>
                    <option>Vitrinas / Mostrador Refrigerado</option>
                    <option>Fabricador de Hielo</option>
                </select>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Tipo de Mantenimiento</label>
                <select id="tipoMantenimiento" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200">
                    <option>Preventivo</option>
                    <option>Correctivo</option>
                </select>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Servicio / Acción</label>
                <select id="servicio" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200">
                    <option value="Inspección, limpieza, medición y ajuste integral del sistema de refrigeración (Mtto. Preventivo)">Inspección, limpieza, medición y ajuste integral del sistema de refrigeración (Mtto. Preventivo)</option>
                    <option value="Reparación de fugas, sustitución de componentes, barrido con nitrógeno y carga de gas">Reparación de fugas, sustitución de componentes, barrido con nitrógeno y carga de gas</option>
                    <option value="Cambio de compresor, sustitución de componentes, barrido y carga de gas">Cambio de compresor, sustitución de componentes, barrido y carga de gas</option>
                    <option value="Reparación de fallas eléctricas y electrónicas">Reparación de fallas eléctricas y electrónicas</option>
                    <option value="Cambio de motor">Cambio de motor</option>
                    <option value="Cambio de elementos de arranque y protección">Cambio de elementos de arranque y protección</option>
                    <option value="Cambio de válvulas, termostatos, sensores y controles">Cambio de válvulas, termostatos, sensores y controles</option>
                    <option value="Cambio de empaques, gomas y accesorios">Cambio de empaques, gomas y accesorios</option>
                    <option value="Instalación de equipo: montaje, canalización de tuberías, cableado eléctrico, sellado de puntos de conexión y puesta en marcha">Instalación de equipo: montaje, canalización de tuberías, cableado eléctrico, sellado de puntos de conexión y puesta en marcha</option>
                    <option value="Reubicación de equipo: retiro técnico, traslado, reinstalación integral, verificación de estanqueidad y ajuste de niveles de operación">Reubicación de equipo: retiro técnico, traslado, reinstalación integral, verificación de estanqueidad y ajuste de niveles de operación</option>
                    <option value="Desmontaje de equipo: retiro controlado, recuperación segura de refrigerante, desconexión de puntos y estibado de componentes">Desmontaje de equipo: retiro controlado, recuperación segura de refrigerante, desconexión de puntos y estibado de componentes</option>
                </select>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Especificaciones</label>
                <input type="text" id="especificaciones" placeholder="Ej: 12.000 BTU / R410A" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Cantidad</label>
                    <input type="number" id="cantidad-input" placeholder="0" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-rose-500 focus:ring-1 focus:ring-rose-500 transition-all">


                </div>
                <div class="space-y-1.5">
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Precio Unitario ($)</label>
                    <input type="number" id="precio" placeholder="0.00" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200">
                </div>
            </div>

            <button type="button" onclick="guardarPartida()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-amber-500/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2 text-sm">
                <i class="fa-solid fa-plus text-base"></i> Agregar al Presupuesto
            </button>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur-md border-t border-slate-800 px-6 py-2 shadow-2xl">
        <div class="max-w-md mx-auto flex justify-between items-center text-center">
            <a href="index.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-amber-500 transition-colors py-1 px-3">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px] font-medium tracking-wide">Panel</span>
            </a>
            <div class="flex flex-col items-center gap-1 text-amber-500 py-1 px-3 border-b-2 border-amber-500">
                <i class="fa-solid fa-snowflake text-lg"></i>
                <span class="text-[10px] font-bold tracking-wide">Refrig.</span>
            </div>
            <a href="perfil.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-amber-500 transition-colors py-1 px-3">
                <i class="fa-solid fa-gear text-lg"></i>
                <span class="text-[10px] font-medium tracking-wide">Config</span>
            </a>
        </div>
    </nav>

<script>
function guardarPartida() {
    const equipo = document.getElementById('equipo').value;
    const tipo = document.getElementById('tipoMantenimiento').value;
    const servicio = document.getElementById('servicio').value;
    const specs = document.getElementById('especificaciones').value;
    const cantidad = parseFloat(document.getElementById('cantidad').value) || 0;
    const precioUnitario = parseFloat(document.getElementById('precio').value) || 0;

    if (cantidad <= 0 || precioUnitario <= 0) {
        alert('Por favor, ingresa cantidad y precio unitario válidos.');
        return;
    }

            const nuevaPartida = {
        modulo: 'REFRIGERACIÓN',
        equipo: equipo,
        especificaciones: specs,
        servicio: servicio,
        cantidad: cantidad,
        precioUnitario: precioUnitario,
        totalUSD: cantidad * precioUnitario
    };



    let presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
    presupuesto.push(nuevaPartida);
    localStorage.setItem('presupuestoActual', JSON.stringify(presupuesto));

    document.getElementById('cantidad').value = "";
    document.getElementById('precio').value = "";
    document.getElementById('especificaciones').value = "";

    alert('¡Partida agregada con éxito!');
}
</script>
</body>
</html>
