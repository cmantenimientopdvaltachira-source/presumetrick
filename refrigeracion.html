<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresuMetrick - Refrigeración</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans">

    <header class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-800 px-4 py-4 flex items-center justify-between shadow-lg">
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-slate-400 hover:text-amber-500 transition-colors p-1">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </a>
            <h1 class="text-xl font-bold tracking-tight text-amber-500"><i class="fa-solid fa-snowflake mr-1"></i> Refrigeración</h1>
        </div>
    </header>

    <main class="flex-1 p-4 max-w-md mx-auto w-full space-y-6 pb-24">
        <div class="bg-slate-800/80 border border-slate-700/50 rounded-2xl p-5 shadow-xl space-y-4">
            <h2 class="text-base font-semibold text-slate-200 border-b border-slate-700 pb-2">Nuevo Concepto</h2>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase">Categoría</label>
                <select id="categoria-select" onchange="actualizarTrabajos()" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500">
                    <option value="INSTALACIÓN">INSTALACIÓN</option>
                    <option value="MANTENIMIENTO">MANTENIMIENTO</option>
                    <option value="SERVICIOS ESPECIALIZADOS">SERVICIOS ESPECIALIZADOS</option>
                </select>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase">Trabajo / Equipo</label>
                <select id="trabajo-select" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500">
                    </select>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-amber-500 uppercase">Especificaciones (BTU / KG)</label>
                <input type="text" id="detalle-input" placeholder="Ej: 24.000 BTU / 1.5 KG" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:border-amber-500 outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="block text-xs font-medium text-slate-400 uppercase">Cantidad</label>
                    <input type="number" id="cantidad-input" step="0.01" placeholder="0" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:border-amber-500 outline-none">
                </div>
                <div class="space-y-1.5">
                    <label class="block text-xs font-medium text-slate-400 uppercase">Unidad de Cobro</label>
                    <select id="unidad-select" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:border-amber-500 outline-none">
                        <option value="Und">Und</option>
                        <option value="KG">KG</option>
                        <option value="Mtrs">Mtrs</option>
                        <option value="Serv">Serv</option>
                        <option value="Glob">Glob</option>
                    </select>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase">Precio Unitario ($)</label>
                <input type="number" id="precio-input" step="0.01" placeholder="0.00" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:border-amber-500 outline-none">
            </div>

            <button type="button" onclick="guardarPartida()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-3.5 rounded-xl transition-all">
                Agregar al Presupuesto
            </button>
        </div>
    </main>

    <script>
        const opcionesTrabajo = {
            "INSTALACIÓN": ["Split / Ventana", "Piso-Techo", "Compacto", "Chiller / Industrial", "Vitrina Comercial"],
            "MANTENIMIENTO": ["Aire Split", "Nevera", "Cuarto Frío", "Preventivo General", "Correctivo General"],
            "SERVICIOS ESPECIALIZADOS": ["Reparación de Fugas", "Barrido con Nitrógeno", "Lavado Químico", "Vacío y Carga de Gas", "Cambio de Compresor"]
        };

        function actualizarTrabajos() {
            const cat = document.getElementById('categoria-select').value;
            const sel = document.getElementById('trabajo-select');
            sel.innerHTML = opcionesTrabajo[cat].map(t => `<option value="${t}">${t}</option>`).join('');
        }

        // Inicializar al cargar
        actualizarTrabajos();

        function guardarPartida() {
            const cat = document.getElementById('categoria-select').value;
            const trab = document.getElementById('trabajo-select').value;
            const det = document.getElementById('detalle-input').value;
            const cant = parseFloat(document.getElementById('cantidad-input').value) || 0;
            const prec = parseFloat(document.getElementById('precio-input').value) || 0;
            const unid = document.getElementById('unidad-select').value;

            if (cant <= 0 || prec <= 0) {
                alert('Verifica la cantidad y el precio.');
                return;
            }

            // Concatenación: CATEGORÍA - Trabajo (Especificación)
            const descripcionFinal = `${cat} - ${trab} ${det ? '(' + det + ')' : ''}`;

            const nuevaPartida = {
                modulo: 'Refrigeración',
                trabajo: descripcionFinal,
                cantidad: cant,
                unidad: unid,
                precioUnitario: prec,
                totalUSD: cant * prec
            };

            let presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
            presupuesto.push(nuevaPartida);
            localStorage.setItem('presupuestoActual', JSON.stringify(presupuesto));

            alert('¡Partida agregada!');
            document.getElementById('detalle-input').value = "";
            document.getElementById('cantidad-input').value = "";
            document.getElementById('precio-input').value = "";
        }
    </script>
</body>
</html>
