<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresuMetrick - Módulo Refrigeración</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div class="p-4 max-w-lg mx-auto space-y-6">
        <header class="text-center py-4">
            <h1 class="text-2xl font-bold text-amber-500">Módulo Refrigeración</h1>
            <p class="text-slate-400 text-sm">Registro Técnico de Partidas</p>
        </header>

        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 space-y-4 shadow-2xl">
            
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Equipo</label>
                <select id="equipo" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm">
                    <option>Split / Ventana</option>
                    <option>Compacto</option>
                    <option>Chiller</option>
                    <option>Nevera / Congelador</option>
                    <option>Cuarto Frío / Cava</option>
                    <option>Exhibidora Comercial</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Tipo de Mantenimiento</label>
                <select id="tipoMantenimiento" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm">
                    <option>Preventivo</option>
                    <option>Correctivo</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Servicio / Acción</label>
                <input type="text" id="servicio" placeholder="Ej: Lavado, Carga de gas, Cambio compresor..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm">
            </div>

            <div>
                <label class="block text-xs font-bold text-amber-500 uppercase mb-1">Especificaciones (BTU, KG, Ton)</label>
                <input type="text" id="especificaciones" placeholder="Ej: 24.000 BTU / 1.5 KG / R410A" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Cantidad</label>
                    <input type="number" id="cantidad" placeholder="1" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Precio Unitario ($)</label>
                    <input type="number" id="precio" placeholder="0.00" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm">
                </div>
            </div>

            <button onclick="agregarPartida()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-4 rounded-xl transition-all shadow-lg shadow-amber-900/20">
                Agregar Partida al Presupuesto
            </button>
        </div>
    </div>

    <script>
        function agregarPartida() {
            const data = {
                equipo: document.getElementById('equipo').value,
                tipo: document.getElementById('tipoMantenimiento').value,
                servicio: document.getElementById('servicio').value,
                specs: document.getElementById('especificaciones').value,
                cantidad: document.getElementById('cantidad').value,
                precio: document.getElementById('precio').value
            };

            if (!data.servicio || !data.cantidad || !data.precio) {
                alert("Por favor completa los campos obligatorios.");
                return;
            }

            // Aquí se genera la descripción técnica para el PDF/WhatsApp
            const descripcionCompleta = `${data.equipo} - ${data.tipo}: ${data.servicio} (${data.specs})`;
            const total = data.cantidad * data.precio;

            console.log("Guardando partida:", { descripcionCompleta, cantidad: data.cantidad, total });
            
            alert(`Partida agregada:\n${descripcionCompleta}\nTotal: $${total}`);
            
            // Lógica para guardar en localStorage iría aquí...
        }
    </script>
</body>
</html>
