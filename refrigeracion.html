<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo Refrigeración</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans p-4">

    <div class="max-w-lg mx-auto space-y-6">
        <header class="text-center py-4">
            <h1 class="text-2xl font-bold text-amber-500">Módulo Refrigeración</h1>
        </header>

        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 space-y-4 shadow-2xl">
            <select id="equipo" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm">
                <option>Split / Ventana</option>
                <option>Compacto</option>
                <option>Chiller</option>
            </select>
            
            <select id="tipoMantenimiento" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm">
                <option>Preventivo</option>
                <option>Correctivo</option>
            </select>

            <select id="servicio" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm">
                <option value="Mantenimiento Preventivo Completo">Mantenimiento Preventivo Completo</option>
                <option value="Reparación de Fugas">Reparación de Fugas</option>
                <option value="Vacío y Carga de Gas">Vacío y Carga de Gas</option>
            </select>

            <input type="text" id="especificaciones" placeholder="Especificaciones (BTU, KG...)" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm">
            
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="cantidad" placeholder="Cant." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm">
                <input type="number" id="precio" placeholder="Precio $" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm">
            </div>

            <button onclick="agregarPartida()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-4 rounded-xl">
                Agregar Partida
            </button>
        </div>

        <div id="historial" class="bg-slate-800 rounded-2xl p-6 space-y-3">
            <h2 class="text-lg font-bold text-slate-300">Presupuesto Actual</h2>
            <ul id="listaPartidas" class="space-y-2 text-sm text-slate-400">
                </ul>
        </div>
    </div>

    <script>
        function agregarPartida() {
            const eq = document.getElementById('equipo').value;
            const serv = document.getElementById('servicio').value;
            const cant = document.getElementById('cantidad').value;
            const prec = document.getElementById('precio').value;

            if(!cant || !prec) { alert("Completa cantidad y precio"); return; }

            const total = cant * prec;
            const li = document.createElement('li');
            li.className = "border-b border-slate-700 pb-2 flex justify-between";
            li.innerHTML = `<span>${cant}x ${eq} (${serv})</span> <span>$${total}</span>`;
            
            document.getElementById('listaPartidas').appendChild(li);
            
            // Limpiar campos
            document.getElementById('cantidad').value = '';
            document.getElementById('precio').value = '';
        }
    </script>
</body>
</html>
