<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresuMetrick - Sistemas Contra Incendios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d1322; color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="min-h-screen pb-28">

    <!-- Header Superior -->
    <header class="bg-[#111827] border-b border-gray-800 p-4 sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <a href="index.html" class="text-gray-400 hover:text-white text-lg"><i class="fa-solid fa-arrow-left"></i></a>
            <h1 class="text-lg font-bold text-red-500 flex items-center gap-2">
                <i class="fa-solid fa-fire-extinguisher"></i> Contra Incendios
            </h1>
        </div>
        <div class="bg-red-500/20 text-red-400 border border-red-500/30 text-xs font-semibold px-3 py-1 rounded-full shadow">
            Módulo Activo
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="max-w-xl mx-auto p-4 space-y-4">
        
        <!-- Tarjeta de Instrucción -->
        <div class="bg-[#161f31] border border-gray-800 rounded-xl p-4 text-sm text-gray-300">
            Selecciona el equipo o componente y la actividad para registrar el servicio técnico.
        </div>

        <!-- Formulario Nueva Partida -->
        <div class="bg-[#161f31] border border-gray-800 rounded-2xl p-5 shadow-lg space-y-4">
            <div class="flex items-center space-x-2 text-red-500 font-semibold border-b border-gray-800 pb-2">
                <i class="fa-solid fa-calculator"></i>
                <span>Nueva Partida</span>
            </div>

            <!-- Equipo / Componente -->
            <div>
                <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1 font-semibold">Equipo / Componente</label>
                <select id="equipo" class="w-full bg-[#0d1322] border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-red-500">
                    <option value="">Seleccione un equipo...</option>
                    <option value="Sistema de Bombeo Contra Incendios (Jockey / Principal)">Sistema de Bombeo Contra Incendios (Jockey / Principal)</option>
                    <option value="Red de Hidrantes y Gabinetes">Red de Hidrantes y Gabinetes</option>
                    <option value="Extintores Portátiles (PQS / CO2 / Solkaflam)">Extintores Portátiles (PQS / CO2 / Solkaflam)</option>
                    <option value="Sistema de Detección de Humo y Calor">Sistema de Detección de Humo y Calor</option>
                    <option value="Tablero de Control PCI / Rociadores">Tablero de Control PCI / Rociadores</option>
                    <option value="Red de Tuberías y Válvulas de Control">Red de Tuberías y Válvulas de Control</option>
                </select>
            </div>

            <!-- Servicio / Acción -->
            <div>
                <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1 font-semibold">Servicio / Acción</label>
                <select id="servicio" class="w-full bg-[#0d1322] border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-red-500">
                    <option value="">Seleccione una acción...</option>
                    <option value="Mantenimiento Preventivo Integral de Bombas (Jockey y Principal)">Mantenimiento Preventivo Integral de Bombas (Jockey y Principal)</option>
                    <option value="Prueba de Presión y Flujo en Red de Hidrantes">Prueba de Presión y Flujo en Red de Hidrantes</option>
                    <option value="Recarga, Retimbrado y Mantenimiento de Extintores">Recarga, Retimbrado y Mantenimiento de Extintores</option>
                    <option value="Inspección, Limpieza y Prueba Funcional de Detectores de Humo">Inspección, Limpieza y Prueba Funcional de Detectores de Humo</option>
                    <option value="Verificación, Calibración y Mantenimiento de Tablero PCI">Verificación, Calibración y Mantenimiento de Tablero PCI</option>
                    <option value="Prueba Hidrostática y de Estanqueidad en Red de Tuberías">Prueba Hidrostática y de Estanqueidad en Red de Tuberías</option>
                    <option value="Sustitución de componentes, válvulas o mangueras de gabinetes">Sustitución de componentes, válvulas o mangueras de gabinetes</option>
                    <option value="Instalación y puesta en marcha de sistema de extinción / detección">Instalación y puesta en marcha de sistema de extinción / detección</option>
                </select>
            </div>

            <!-- Especificaciones -->
            <div>
                <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1 font-semibold">Especificaciones</label>
                <input type="text" id="especificaciones" placeholder="Ej: Capacidad 500 GPM / Polvo Químico 10 Lb" class="w-full bg-[#0d1322] border border-gray-700 rounded-xl p-3 text-white placeholder-gray-500 focus:outline-none focus:border-red-500">
            </div>

            <!-- Cantidad y Precio Unitario (Sin valores por defecto) -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1 font-semibold">Cantidad</label>
                    <input type="number" id="cantidad-input" min="1" placeholder="0" class="w-full bg-[#0d1322] border border-gray-700 rounded-xl p-3 text-white text-center focus:outline-none focus:border-red-500">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1 font-semibold">Precio Unitario ($)</label>
                    <input type="number" id="precio-input" step="0.01" placeholder="0.00" class="w-full bg-[#0d1322] border border-gray-700 rounded-xl p-3 text-white text-center focus:outline-none focus:border-red-500">
                </div>
            </div>

            <!-- Botón Agregar -->
            <button type="button" onclick="guardarPartida()" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold p-3.5 rounded-xl transition shadow-md shadow-red-600/20 flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> Agregar al Presupuesto
            </button>
        </div>

    </main>

    <!-- Barra Inferior de Acciones -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#111827] border-t border-gray-800 p-3 flex items-center justify-around z-50">
        <a href="index.html" class="flex flex-col items-center text-gray-400 hover:text-red-500 text-xs">
            <i class="fa-solid fa-house text-lg"></i>
            <span>Panel</span>
        </a>
        <a href="#" class="flex flex-col items-center text-red-500 text-xs font-semibold">
            <i class="fa-solid fa-fire-extinguisher text-lg"></i>
            <span>Contra Inc.</span>
        </a>
        <a href="perfil.html" class="flex flex-col items-center text-gray-400 hover:text-red-500 text-xs">
            <i class="fa-solid fa-gear text-lg"></i>
            <span>Config</span>
        </a>
    </nav>

    <!-- Script de lógica -->
    <script>
        function guardarPartida() {
            const equipo = document.getElementById('equipo').value;
            const servicio = document.getElementById('servicio').value;
            const specs = document.getElementById('especificaciones').value;
            
            const cantidad = parseFloat(document.getElementById('cantidad-input').value);
            const precioUnitario = parseFloat(document.getElementById('precio-input').value);

            if (!equipo || !servicio || isNaN(cantidad) || cantidad <= 0 || isNaN(precioUnitario) || precioUnitario <= 0) {
                alert('Por favor, completa los campos requeridos, cantidad y precio unitario válidos.');
                return;
            }

            const nuevaPartida = {
                modulo: 'SISTEMAS CONTRA INCENDIOS',
                equipo: equipo,
                especificaciones: specs,
                servicio: servicio,
                cantidad: cantidad,
                unidad: 'und',
                precioUnitario: precioUnitario,
                totalUSD: cantidad * precioUnitario
            };

            let presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
            presupuesto.push(nuevaPartida);
            localStorage.setItem('presupuestoActual', JSON.stringify(presupuesto));

            // Limpiar formulario completamente
            document.getElementById('cantidad-input').value = "";
            document.getElementById('precio-input').value = "";
            document.getElementById('especificaciones').value = "";
            document.getElementById('equipo').value = "";
            document.getElementById('servicio').value = "";

            alert('¡Partida de Contra Incendios agregada con éxito!');
        }
    </script>
</body>
</html>
