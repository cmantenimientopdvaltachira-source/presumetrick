<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - PresuMetrick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-[#0F172A] text-gray-100 min-h-screen p-4">

    <header class="flex justify-between items-center mb-6">
        <a href="index.html" class="text-emerald-500 font-bold text-sm"> Volver al Panel</a>
        <h1 class="font-black">PRESUMETRICK</h1>
    </header>

    <main class="max-w-md mx-auto">
        <h2 class="text-xl font-bold mb-4">Tu Presupuesto</h2>
        <div id="lista-presupuesto" class="space-y-3"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', mostrarPresupuesto);

        function mostrarPresupuesto() {
            const tablaContainer = document.getElementById('lista-presupuesto');
            const presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
            
            if (presupuesto.length === 0) {
                tablaContainer.innerHTML = `<p class="text-center text-gray-400 py-10">No hay partidas agregadas aun.</p>`;
                return;
            }

            let htmlContenido = '';
            let granTotal = 0;

            presupuesto.forEach((partida, index) => {
                granTotal += partida.totalUSD;
                htmlContenido += `
                    <div class="bg-[#1F2937] p-4 rounded-lg border border-gray-700">
                        <div class="flex justify-between items-center border-b border-gray-600 pb-2 mb-2">
                            <span class="text-emerald-400 font-bold uppercase text-xs">${partida.modulo}</span>
                            <span class="text-white font-bold">$${partida.totalUSD.toFixed(2)}</span>
                        </div>
                        <p class="text-sm">${partida.trabajo}</p>
                        <p class="text-xs text-gray-400 mt-1">Cant: ${partida.cantidad} | P.U: $${partida.precioUnitario.toFixed(2)}</p>
                    </div>
                `;
            });

            const tasaBCV = parseFloat(localStorage.getItem('tasaBCV')) || 517.96;
            const porcentajeImpuesto = parseFloat(localStorage.getItem('porcentajeImpuesto')) || 0;

            let bloqueTotalesHtml = '';

            if (porcentajeImpuesto > 0) {
                const montoImpuesto = granTotal * (porcentajeImpuesto / 100);
                const granTotalConImpuesto = granTotal + montoImpuesto;
                const totalBs = granTotalConImpuesto * tasaBCV;

                bloqueTotalesHtml = `
                    <div class="bg-emerald-600 rounded-xl p-4 mt-6 shadow-lg space-y-1.5 text-right">
                        <div class="text-xs font-bold text-emerald-100 uppercase tracking-wider text-left border-b border-emerald-500/30 pb-1 mb-2">Resumen Financiero</div>
                        <div class="text-xs text-white flex justify-between"><span>Subtotal:</span> <span class="font-bold">$${granTotal.toFixed(2)} USD</span></div>
                        <div class="text-xs text-white flex justify-between"><span>Impuesto (${porcentajeImpuesto}%):</span> <span class="font-bold">+$${montoImpuesto.toFixed(2)} USD</span></div>
                        <div class="border-t border-emerald-500/40 my-1"></div>
                        <div class="text-base font-black text-white flex justify-between items-center"><span>TOTAL GENERAL:</span> <span class="text-xl">$${granTotalConImpuesto.toFixed(2)} USD</span></div>
                        <div class="text-xs font-bold text-emerald-100 text-right pt-1">
                            Equivalente BCV: Bs. ${totalBs.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                        </div>
                    </div>
                `;
            } else {
                const totalBs = granTotal * tasaBCV;

                bloqueTotalesHtml = `
                    <div class="bg-emerald-600 rounded-xl p-4 mt-6 shadow-lg space-y-1.5">
                        <div class="flex justify-between items-center text-white">
                            <span class="font-bold uppercase text-xs">Total General:</span>
                            <span class="font-bold text-xl">$${granTotal.toFixed(2)} USD</span>
                        </div>
                        <div class="text-emerald-100 text-xs border-t border-emerald-500/40 pt-2 text-right font-bold">
                            Equivalente BCV: Bs. ${totalBs.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                        </div>
                    </div>
                `;
            }

            tablaContainer.innerHTML = `
                ${htmlContenido}
                ${bloqueTotalesHtml}
                <div class="flex gap-3 mt-6">
                    <button onclick="enviarWhatsApp()" class="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg text-sm transition-all active:scale-95">WhatsApp</button>
                    <button onclick="generarPDF()" class="flex-1 bg-sky-700 text-white font-bold py-3 rounded-xl shadow-lg text-sm transition-all active:scale-95">PDF Formal</button>
                </div>
                <div class="text-center mt-6 mb-20">
                    <button onclick="vaciarPresupuesto()" class="text-rose-400 text-xs underline font-medium">Borrar todo</button>
                </div>
            `;
        }

        function vaciarPresupuesto() {
            if (confirm('¿Seguro que quieres borrar todo el presupuesto?')) {
                localStorage.setItem('presupuestoActual', JSON.stringify([]));
                location.reload();
            }
        }

                function unidadLinter(uni) {
            const u = uni.toLowerCase().trim();
            if (u.includes('glob')) return 'Global';
            if (u.includes('ptr') || u.includes('mtr') || u.includes('met')) return 'Metros';
            if (u.includes('pto') || u.includes('pun')) return 'Pto';
            if (u.includes('und') || u.includes('uni')) return 'Unid';
            if (u.includes('kg') || u.includes('kil')) return 'KG';
            
            // Si el texto de la unidad es largo o idéntico al trabajo, asumimos Global por defecto
            return 'Global';
        }

                        function enviarWhatsApp() {
            const presupuesto = JSON.parse(localStorage.getItem('presupuestoActual') || '[]');
            if (presupuesto.length === 0) {
                alert("No hay partidas en el presupuesto para enviar.");
                return;
            }
            
            const tasaBCV = parseFloat(localStorage.getItem('tasaBCV')) || 51.96;
            const porcentajeImpuesto = parseFloat(localStorage.getItem('porcentajeImpuesto')) || 0;
            
            let mensaje = "*PRESUPUESTO FORMAL*\n";
            mensaje += "--------------------------------------\n\n";
            
            let granTotal = 0;
            presupuesto.forEach(p => {
                // 1. Limpieza total de textos duplicados o espacios extra
                const textoOriginal = p.trabajo || '';
                const nombreLimpio = textoOriginal.split('(')[0].trim();

                const unidadOriginal = (p.unidad || '').split('(')[0].trim();
                const unidadVisual = unidadLinter(unidadOriginal);

                // 2. Control inteligente de etiquetas
                let etiquetaPrecio = `Precio por ${unidadVisual}`;
                if (unidadVisual === 'Global') {
                    etiquetaPrecio = 'Precio Global';
                } else if (unidadVisual === 'Unid') {
                    etiquetaPrecio = 'Precio Unitario';
                }

                // 3. Estructura protegida contra textos largos (Mantenida exactamente igual)
                mensaje += `*• ${(p.modulo || 'SERVICIO').toUpperCase()}:*\n`;
                mensaje += `_${nombreLimpio}_\n`; 
                
                // === AGREGADO DE FORMA EXCLUSIVA: CASILLA DE OBSERVACIONES/NOTAS ===
                if (p.nota && p.nota.trim() !== "") {
                    mensaje += `📝 _Nota: ${p.nota}_\n`;
                }

                // El resto del desglose sigue intacto con tus rombos azules alineados
                mensaje += `🔹 Cantidad: ${p.cantidad} ${unidadVisual}\n`;
                mensaje += `🔹 ${etiquetaPrecio}: $${parseFloat(p.precioUnitario).toFixed(2)}\n`;
                mensaje += `🔹 Subtotal: $${parseFloat(p.totalUSD).toFixed(2)}\n\n`;

                granTotal += p.totalUSD;
            });

            mensaje += "--------------------------------------\n";
            
            if (porcentajeImpuesto > 0) {
                const montoImpuesto = granTotal * (porcentajeImpuesto / 100);
                const granTotalConImpuesto = granTotal + montoImpuesto;
                const totalBs = granTotalConImpuesto * tasaBCV;
                
                mensaje += `*Subtotal:* $${granTotal.toFixed(2)} USD\n`;
                mensaje += `*Impuesto (${porcentajeImpuesto}%):* $${montoImpuesto.toFixed(2)} USD\n`;
                mensaje += `*TOTAL GENERAL:* $${granTotalConImpuesto.toFixed(2)} USD\n`;
                mensaje += `*Equivalente BCV:* Bs. ${totalBs.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}\n`;
            } else {
                const totalBs = granTotal * tasaBCV;
                
                mensaje += `*TOTAL GENERAL:* $${granTotal.toFixed(2)} USD\n`;
                mensaje += `*Equivalente BCV:* Bs. ${totalBs.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}\n`;
            }
            
            mensaje += "\n_Generado por PresuMetrick._";
            
            const link = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;
            window.open(link, '_blank');
        }




        function generarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
            const nombreEmpresa = localStorage.getItem('nombreEmpresa') || "Profesional";
            const rifEmpresa = localStorage.getItem('rifEmpresa') || "";
            const direccionEmpresa = localStorage.getItem('direccionEmpresa') || "San Cristóbal, Táchira";
            const telefonoEmpresa = localStorage.getItem('telefonoWhatsApp') || ""; 
            const tasaBCV = parseFloat(localStorage.getItem('tasaBCV')) || 517.96;
            const logoBase64 = localStorage.getItem('logoEmpresa');

            if (presupuesto.length === 0) {
                alert("No hay partidas para generar el PDF");
                return;
            }

            const cliente = prompt("Nombre del cliente:");
            if (!cliente) return;

            const porcentajeImpuesto = parseFloat(localStorage.getItem('porcentajeImpuesto')) || 0;

            if (logoBase64) {
                try {
                    doc.addImage(logoBase64, 'JPEG', 15, 15, 25, 25);
                } catch (e) { console.warn("No se pudo cargar el logo"); }
            }
            
            doc.setFontSize(16);
            doc.setFont("helvetica", "bold");
            doc.text(nombreEmpresa.toUpperCase(), 45, 22); 
            
            doc.setFont("helvetica", "normal");
            doc.setFontSize(9);
            doc.text("Dirección: " + direccionEmpresa, 45, 28); 
            doc.text("RIF: " + rifEmpresa, 45, 33);             
            if (telefonoEmpresa) {
                doc.text("Teléfono: " + telefonoEmpresa, 45, 38);  
            }
            
            doc.line(15, 48, 195, 48);

            const fechaActual = new Date();
            const dia = String(fechaActual.getDate()).padStart(2, '0');
            const mes = String(fechaActual.getMonth() + 1).padStart(2, '0');
            const anioCorto = String(fechaActual.getFullYear()).slice(-2); 
            const fechaFormateada = `${dia}/${mes}/${anioCorto}`;

            let y = 56;
            doc.setFontSize(12);
            doc.setFont("helvetica", "bold");
            doc.text("Presupuesto para: " + cliente, 15, y);
            
            doc.setFont("helvetica", "normal");
            doc.setFontSize(10);
            doc.text("Fecha: " + fechaFormateada, 15, y + 7);
            
            y += 20; 
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text("Descripcion", 15, y);
            doc.text("Total", 170, y);
            doc.line(15, y + 2, 195, y + 2);
            
            doc.setFont("helvetica", "normal");
            y += 10;
            let subtotalUSD = 0;

            presupuesto.forEach((p) => {
                doc.text(p.trabajo.substring(0, 70), 15, y);
                doc.text("$" + p.totalUSD.toFixed(2), 170, y);
                subtotalUSD += p.totalUSD;
                y += 8;
            });

            y += 10;
            doc.line(15, y, 195, y);
            y += 10;
            doc.setFont("helvetica", "bold");

            if (porcentajeImpuesto > 0) {
                const montoImpuesto = subtotalUSD * (porcentajeImpuesto / 100);
                const granTotalConImpuesto = subtotalUSD + montoImpuesto;

                doc.text(`SUBTOTAL: $${subtotalUSD.toFixed(2)} USD`, 120, y);
                y += 6;
                doc.text(`IMPUESTO (${porcentajeImpuesto}%): $${montoImpuesto.toFixed(2)} USD`, 120, y);
                y += 6;
                doc.text(`TOTAL GENERAL: $${granTotalConImpuesto.toFixed(2)} USD`, 120, y);
                y += 7;
                doc.text(`Equivalente BCV: Bs. ${(granTotalConImpuesto * tasaBCV).toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`, 120, y);
            } else {
                doc.text(`TOTAL GENERAL: $${subtotalUSD.toFixed(2)} USD`, 120, y);
                y += 7;
                doc.text(`Equivalente BCV: Bs. ${(subtotalUSD * tasaBCV).toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`, 120, y);
            }

            doc.save(`Presupuesto_${cliente.replace(/\s+/g, '_')}.pdf`);
        }
    </script>
</body>
</html>
