<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - PresuMetrick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-[#0F172A] text-gray-100 min-h-screen p-4">

    <header class="flex justify-between items-center mb-6">
        <a href="index.html" class="text-emerald-500 font-bold text-sm"> Volver al Panel</a>
        <h1 class="font-black">PRESUMETRICK</h1>
    </header>

    <main class="max-w-md mx-auto">
        <h2 class="text-xl font-bold mb-4">Tu Presupuesto</h2>
        <div id="lista-presupuesto" class="space-y-3"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', mostrarPresupuesto);

        function mostrarPresupuesto() {
            const tablaContainer = document.getElementById('lista-presupuesto');
            const presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
            
            if (presupuesto.length === 0) {
                tablaContainer.innerHTML = `<p class="text-center text-gray-400 py-10">No hay partidas agregadas aun.</p>`;
                return;
            }

            let htmlContenido = '';
            let granTotal = 0;

            presupuesto.forEach((partida, index) => {
                granTotal += partida.totalUSD;
                htmlContenido += `
                    <div class="bg-[#1F2937] p-4 rounded-lg border border-gray-700">
                        <div class="flex justify-between items-center border-b border-gray-600 pb-2 mb-2">
                            <span class="text-emerald-400 font-bold uppercase text-xs">${partida.modulo}</span>
                            <span class="text-white font-bold">$${partida.totalUSD.toFixed(2)}</span>
                        </div>
                        <p class="text-sm">${partida.trabajo}</p>
                        <p class="text-xs text-gray-400 mt-1">Cant: ${partida.cantidad} | P.U: $${partida.precioUnitario.toFixed(2)}</p>
                    </div>
                `;
            });

            const tasaBCV = parseFloat(localStorage.getItem('tasaBCV')) || 517.96;
            const totalBs = granTotal * tasaBCV;

            tablaContainer.innerHTML = `
                ${htmlContenido}
                <div class="bg-emerald-600 rounded-xl p-4 mt-6 shadow-lg">
                    <div class="flex justify-between items-center text-white mb-2">
                        <span class="font-bold uppercase">Total General:</span>
                        <span class="font-bold text-xl">$${granTotal.toFixed(2)} USD</span>
                    </div>
                    <div class="text-emerald-100 text-sm border-t border-emerald-500 pt-2">
                        Equivalente BCV: Bs. ${totalBs.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                    </div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button onclick="enviarWhatsApp()" class="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg text-sm">WhatsApp</button>
                    <button onclick="generarPDF()" class="flex-1 bg-sky-700 text-white font-bold py-3 rounded-xl shadow-lg text-sm">PDF Formal</button>
                </div>
                <div class="text-center mt-6 mb-20">
                    <button onclick="vaciarPresupuesto()" class="text-rose-400 text-xs underline font-medium">Borrar todo</button>
                </div>
            `;
        }

        function vaciarPresupuesto() {
            if (confirm('¿Seguro que quieres borrar todo el presupuesto?')) {
                localStorage.setItem('presupuestoActual', JSON.stringify([]));
                location.reload();
            }
        }

        function enviarWhatsApp() {
    const presupuesto = JSON.parse(localStorage.getItem('presupuesto') || '[]');
    if (presupuesto.length === 0) return;
    
    // Recupera el teléfono guardado o usa un número por defecto
    const telefono = localStorage.getItem('telefonoWhatsApp') || '';
    
    let mensaje = "Hola, aqui tienes mi presupuesto:\n";
    presupuesto.forEach(p => mensaje += `* ${p.descripcion}: $${p.precio}\n`);
    
    const link = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
    window.open(link, '_blank');
}

       

                function generarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // 1. Obtener datos configurados
    const presupuesto = JSON.parse(localStorage.getItem('presupuestoActual') || '[]');
    const nombreEmpresa = localStorage.getItem('nombreEmpresa') || "Profesional";
    const rifEmpresa = localStorage.getItem('rifEmpresa') || "";
    const direccionEmpresa = localStorage.getItem('direccionEmpresa') || "San Cristóbal, Táchira"; // Recupera dirección
    const tasaBCV = parseFloat(localStorage.getItem('tasaBCV')) || 517.96;
    const logoBase64 = localStorage.getItem('logoEmpresa');

    if (presupuesto.length === 0) {
        alert("No hay partidas para generar el PDF");
        return;
    }

    const cliente = prompt("Nombre del cliente:");
    if (!cliente) return;

    // 2. Encabezado y Logo
    let y = 20;
    if (logoBase64) {
        try {
            doc.addImage(logoBase64, 'JPEG', 15, 15, 25, 25);
        } catch (e) { console.warn("No se pudo cargar el logo"); }
    }
    
    doc.setFontSize(18);
    doc.text(nombreEmpresa.toUpperCase(), 45, 25);
    doc.setFontSize(10);
    doc.text("RIF: " + rifEmpresa, 45, 32);
    doc.line(15, 45, 195, 45);

    // 2.1 Formatear Fecha a dos dígitos (DD/MM/AAAA)
    const fechaActual = new Date();
    const dia = String(fechaActual.getDate()).padStart(2, '0');
    const mes = String(fechaActual.getMonth() + 1).padStart(2, '0');
    const anio = fechaActual.getFullYear();
    const fechaFormateada = `${dia}/${mes}/${anio}`;

    // 3. Info del Cliente y Dirección
    y = 55;
    doc.setFontSize(12);
    doc.setFont("helvetica", "bold");
    doc.text("Presupuesto para: " + cliente, 15, y);
    
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text("Fecha: " + fechaFormateada, 15, y + 7);
    doc.text("Dirección: " + direccionEmpresa, 15, y + 13);
    
    // 4. Tabla de Partidas
    y += 25; // Aumentamos espacio para que no se monte con la dirección
    doc.setFontSize(10);
    doc.setFont("helvetica", "bold");
    doc.text("Descripcion", 15, y);
    doc.text("Total", 170, y);
    doc.line(15, y + 2, 195, y + 2);
    
    doc.setFont("helvetica", "normal");
    y += 10;
    let granTotal = 0;

    presupuesto.forEach((p) => {
        doc.text(p.trabajo.substring(0, 70), 15, y);
        doc.text("$" + p.totalUSD.toFixed(2), 170, y);
        granTotal += p.totalUSD;
        y += 8;
    });

    // 5. Totales
    y += 10;
    doc.line(15, y, 195, y);
    y += 10;
    doc.setFont("helvetica", "bold");
    doc.text(`TOTAL GENERAL: $${granTotal.toFixed(2)} USD`, 120, y);
    doc.text(`Equivalente BCV: Bs. ${(granTotal * tasaBCV).toLocaleString()}`, 120, y + 7);

    // 6. Descargar
    doc.save(`Presupuesto_${cliente.replace(/\s+/g, '_')}.pdf`);
}



    </script>
</body>
</html>
