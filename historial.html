  <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - PresuMetrick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-[#0F172A] text-gray-100 min-h-screen p-4">

    <header class="flex justify-between items-center mb-6">
        <a href="index.html" class="text-emerald-500 font-bold text-sm"> Volver al Panel</a>
        <h1 class="font-black">PRESUMETRICK</h1>
    </header>

    <main class="max-w-md mx-auto">
        <h2 class="text-xl font-bold mb-4">Tu Presupuesto</h2>
        <div id="lista-presupuesto" class="space-y-3"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', mostrarPresupuesto);

        function mostrarPresupuesto() {
            const tablaContainer = document.getElementById('lista-presupuesto');
            const presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
            
            if (presupuesto.length === 0) {
                tablaContainer.innerHTML = `<p class="text-center text-gray-400 py-10">No hay partidas agregadas aun.</p>`;
                return;
            }

            let htmlContenido = '';
            let granTotal = 0;

            presupuesto.forEach((partida) => {
                granTotal += partida.totalUSD;
                htmlContenido += `
                    <div class="bg-[#1F2937] p-4 rounded-lg border border-gray-600">
                        <div class="flex justify-between items-center border-b border-gray-600 pb-2 mb-2">
                            <span class="text-emerald-400 font-bold uppercase text-xs">${partida.modulo}</span>
                            <span class="text-white font-bold">$${partida.totalUSD.toFixed(2)}</span>
                        </div>
                        <p class="font-bold text-sm">${partida.trabajo}</p>
                        <p class="text-sm text-gray-300 mt-1">${partida.descripcion || 'Sin descripción adicional'}</p>
                        <p class="text-xs text-gray-400 mt-2">Cant: ${partida.cantidad} ${unidadLinter(partida.unidad)} | Precio Unitario: $${partida.precioUnitario.toFixed(2)}</p>
                    </div>
                `;
            });

            const tasaBCV = parseFloat(localStorage.getItem('tasaBCV')) || 517.96;
            const porcentajeImpuesto = parseFloat(localStorage.getItem('porcentajeImpuesto')) || 0;
            let totalBs = 0;
            let totalFinal = granTotal;

            if (porcentajeImpuesto > 0) {
                totalFinal = granTotal + (granTotal * (porcentajeImpuesto / 100));
            }
            totalBs = totalFinal * tasaBCV;

            tablaContainer.innerHTML = `
                ${htmlContenido}
                <div class="bg-emerald-600 rounded-xl p-4 mt-6 shadow-lg">
                    <div class="flex justify-between text-white mb-2">
                        <span class="font-bold uppercase text-xs">Total General:</span>
                        <span class="font-bold text-xl">$${totalFinal.toFixed(2)} USD</span>
                    </div>
                    <div class="text-emerald-100 text-xs border-t border-emerald-500/40 pt-2 text-right font-bold">
                        Equivalente BCV: Bs. ${totalBs.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                    </div>
                </div>
                <div class="mt-6 bg-[#1F2937] p-4 rounded-xl border border-gray-600">
                    <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">Nota General</label>
                    <textarea id="observacionesGenerales" class="w-full bg-[#0F172A] border border-gray-600 rounded-lg p-3 text-sm text-white" rows="3"></textarea>
                </div>
                <div class="flex gap-3 mt-6">
                    <button onclick="generarPDF()" class="flex-1 bg-sky-700 text-white font-bold py-3 rounded-xl">PDF Formal</button>
                </div>
            `;
        }

        function unidadLinter(uni) {
            return uni || 'Global';
        }

        function generarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const presupuesto = JSON.parse(localStorage.getItem('presupuestoActual') || '[]');
            const cliente = prompt("Nombre del cliente:") || "Cliente";
            
            // Configuración inicial
            doc.setFont("helvetica", "bold");
            doc.setFontSize(16);
            doc.text("PRESUPUESTO", 15, 20);
            doc.setFontSize(10);
            doc.text("Cliente: " + cliente, 15, 30);
            doc.line(15, 35, 195, 35);

            let y = 45;
            doc.setFontSize(10);

            presupuesto.forEach((p) => {
                if (y > 260) { doc.addPage(); y = 20; }

                // 1. MÓDULO (Categoría)
                doc.setFont("helvetica", "bold");
                doc.text(p.modulo.toUpperCase(), 15, y);
                y += 6;

                // 2. TRABAJO
                doc.setFont("helvetica", "bold");
                const trabajoLines = doc.splitTextToSize(p.trabajo, 140);
                doc.text(trabajoLines, 15, y);
                doc.text("$" + p.totalUSD.toFixed(2), 170, y);
                y += (trabajoLines.length * 5);

                // 3. DESCRIPCIÓN
                doc.setFont("helvetica", "normal");
                const descLines = doc.splitTextToSize(p.descripcion || "", 140);
                doc.text(descLines, 15, y);
                y += (descLines.length * 5) + 2;

                // 4. DETALLES
                doc.setFontSize(8);
                doc.text(`Cant: ${p.cantidad} | P.U: $${p.precioUnitario.toFixed(2)}`, 15, y);
                y += 10;
            });

            doc.save(`Presupuesto_${cliente.replace(/\s+/g, '_')}.pdf`);
        }
    </script>
</body>
</html>
