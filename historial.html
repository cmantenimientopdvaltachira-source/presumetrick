<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - PresuMetrick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-[#0F172A] text-gray-100 min-h-screen p-4">

    <header class="flex justify-between items-center mb-6">
        <a href="index.html" class="text-emerald-500 font-bold text-sm"> Volver al Panel</a>
        <h1 class="font-black">PRESUMETRICK</h1>
    </header>

    <main class="max-w-md mx-auto">
        <h2 class="text-xl font-bold mb-4">Tu Presupuesto</h2>
        <div id="lista-presupuesto" class="space-y-3"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', mostrarPresupuesto);

        function mostrarPresupuesto() {
            const tablaContainer = document.getElementById('lista-presupuesto');
            const presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
            
            if (presupuesto.length === 0) {
                tablaContainer.innerHTML = `<p class="text-center text-gray-400 py-10">No hay partidas agregadas aun.</p>`;
                return;
            }

            let htmlContenido = '';
            let granTotal = 0;

            presupuesto.forEach((partida) => {
                granTotal += partida.totalUSD;
                htmlContenido += `
                    <div class="bg-[#1F2937] p-4 rounded-lg border border-gray-700">
                        <div class="flex justify-between items-center border-b border-gray-600 pb-2 mb-2">
                            <span class="text-emerald-400 font-bold uppercase text-xs">${partida.modulo}</span>
                            <span class="text-white font-bold">$${partida.totalUSD.toFixed(2)}</span>
                        </div>
                        <p class="text-sm">${partida.trabajo}</p>
                        <p class="text-xs text-gray-400 mt-1">Cant: ${partida.cantidad} | P.U: $${partida.precioUnitario.toFixed(2)}</p>
                    </div>
                `;
            });

            const tasaBCV = parseFloat(localStorage.getItem('tasaBCV')) || 517.96;
            const porcentajeImpuesto = parseFloat(localStorage.getItem('porcentajeImpuesto')) || 0;

            let bloqueTotalesHtml = '';
            if (porcentajeImpuesto > 0) {
                const montoImpuesto = granTotal * (porcentajeImpuesto / 100);
                const granTotalConImpuesto = granTotal + montoImpuesto;
                const totalBs = granTotalConImpuesto * tasaBCV;

                bloqueTotalesHtml = `
                    <div class="bg-emerald-600 rounded-xl p-4 mt-6 shadow-lg space-y-1.5 text-right">
                        <div class="text-xs font-bold text-emerald-100 uppercase tracking-wider text-left border-b border-emerald-500/30 pb-1 mb-2">Resumen Financiero</div>
                        <div class="text-xs text-white flex justify-between"><span>Subtotal:</span> <span class="font-bold">$${granTotal.toFixed(2)} USD</span></div>
                        <div class="text-xs text-white flex justify-between"><span>Impuesto (${porcentajeImpuesto}%):</span> <span class="font-bold">+$${montoImpuesto.toFixed(2)} USD</span></div>
                        <div class="border-t border-emerald-500/40 my-1"></div>
                        <div class="text-base font-black text-white flex justify-between items-center"><span>TOTAL GENERAL:</span> <span class="text-xl">$${granTotalConImpuesto.toFixed(2)} USD</span></div>
                        <div class="text-xs font-bold text-emerald-100 text-right pt-1">Equivalente BCV: Bs. ${totalBs.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    </div>
                `;
            } else {
                const totalBs = granTotal * tasaBCV;
                bloqueTotalesHtml = `
                    <div class="bg-emerald-600 rounded-xl p-4 mt-6 shadow-lg space-y-1.5">
                        <div class="flex justify-between items-center text-white">
                            <span class="font-bold uppercase text-xs">Total General:</span>
                            <span class="font-bold text-xl">$${granTotal.toFixed(2)} USD</span>
                        </div>
                        <div class="text-emerald-100 text-xs border-t border-emerald-500/40 pt-2 text-right font-bold">Equivalente BCV: Bs. ${totalBs.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    </div>
                `;
            }

            tablaContainer.innerHTML = `
                ${htmlContenido}
                ${bloqueTotalesHtml}
                <div class="flex gap-3 mt-6">
                    <button onclick="enviarWhatsApp()" class="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg text-sm">WhatsApp</button>
                    <button onclick="generarPDF()" class="flex-1 bg-sky-700 text-white font-bold py-3 rounded-xl shadow-lg text-sm">PDF Formal</button>
                </div>
                <div class="text-center mt-6 mb-20">
                    <button onclick="vaciarPresupuesto()" class="text-rose-400 text-xs underline font-medium">Borrar todo</button>
                </div>
            `;
        }

            function generarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
        if (presupuesto.length === 0) return alert("No hay partidas");

        const cliente = prompt("Nombre del cliente:");
        if (!cliente) return;

        // 1. Solicitud de observaciones
        const obsBase = localStorage.getItem('observacionesGenerales') || "";
        const notasFinales = prompt("Observaciones para este presupuesto:", obsBase);
        if (notasFinales === null) return;

        // 2. Datos Empresa
        const nombreEmpresa = localStorage.getItem('nombreEmpresa') || "Profesional";
        const direccionEmpresa = localStorage.getItem('direccionEmpresa') || "San Cristóbal";
        const logoBase64 = localStorage.getItem('logoEmpresa');

        if (logoBase64) doc.addImage(logoBase64, 'JPEG', 15, 15, 25, 25);
        doc.setFont("helvetica", "bold");
        doc.text(nombreEmpresa.toUpperCase(), 45, 22);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        doc.text(direccionEmpresa, 45, 28);
        doc.line(15, 48, 195, 48);

        // 3. Listado de Partidas
        let y = 60;
        doc.setFontSize(10);
        doc.text("Presupuesto para: " + cliente, 15, y);
        y += 15;

        let subtotalUSD = 0;
        presupuesto.forEach((p) => {
            doc.setFont("helvetica", "bold");
            doc.text(`${p.cantidad} ${p.unidad || ''} - ${p.trabajo}`, 15, y);
            doc.text("$" + p.totalUSD.toFixed(2), 170, y);
            y += 5;
            if (p.nota) {
                doc.setFontSize(8);
                doc.setFont("helvetica", "italic");
                doc.text("Nota: " + p.nota, 18, y);
                y += 7;
            }
            subtotalUSD += p.totalUSD;
            y += 8;
        });

        // 4. Observaciones Generales
        if (notasFinales && notasFinales.trim() !== "") {
            y += 5;
            doc.line(15, y, 195, y);
            y += 10;
            doc.setFont("helvetica", "bold");
            doc.setFontSize(9);
            doc.text("Observaciones:", 15, y);
            y += 5;
            doc.setFont("helvetica", "normal");
            const lineasObs = doc.splitTextToSize(notasFinales, 180);
            doc.text(lineasObs, 15, y);
            y += (lineasObs.length * 5) + 5;
        }

        // 5. Totales
        y += 5;
        doc.line(15, y, 195, y);
        y += 10;
        const imp = parseFloat(localStorage.getItem('porcentajeImpuesto')) || 0;
        const total = subtotalUSD + (subtotalUSD * (imp / 100));
        doc.setFont("helvetica", "bold");
        doc.text(`TOTAL GENERAL: $${total.toFixed(2)} USD`, 120, y);
        
        doc.save(`Presupuesto_${cliente.replace(/\s+/g, '_')}.pdf`);
    }


        function vaciarPresupuesto() {
            if (confirm('¿Borrar todo?')) {
                localStorage.setItem('presupuestoActual', JSON.stringify([]));
                location.reload();
            }
        }
    </script>
</body>
</html>
