<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - PresuMetrick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-[#0F172A] text-gray-100 min-h-screen p-4">

    <header class="flex justify-between items-center mb-6">
        <a href="index.html" class="text-emerald-500 font-bold text-sm"> Volver al Panel</a>
        <h1 class="font-black">PRESUMETRICK</h1>
    </header>

    <main class="max-w-md mx-auto">
        <h2 class="text-xl font-bold mb-4">Tu Presupuesto</h2>
        <div id="lista-presupuesto" class="space-y-3"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', mostrarPresupuesto);

        function mostrarPresupuesto() {
            const tablaContainer = document.getElementById('lista-presupuesto');
            const presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
            
            if (presupuesto.length === 0) {
                tablaContainer.innerHTML = `<p class="text-center text-gray-400 py-10">No hay partidas agregadas aun.</p>`;
                return;
            }

            let htmlContenido = '';
            let granTotal = 0;

            presupuesto.forEach((partida) => {
                granTotal += partida.totalUSD;
                htmlContenido += `
                    <div class="bg-[#1F2937] p-4 rounded-lg border border-gray-700">
                        <div class="flex justify-between items-center border-b border-gray-600 pb-2 mb-2">
                            <span class="text-emerald-400 font-bold uppercase text-xs">${partida.modulo}</span>
                            <span class="text-white font-bold">$${partida.totalUSD.toFixed(2)}</span>
                        </div>
                        <p class="text-sm">${partida.trabajo}</p>
                        <p class="text-xs text-gray-400 mt-1">Cant: ${partida.cantidad} | Precio Unitario: $${partida.precioUnitario.toFixed(2)}</p>
                    </div>
                `;
            });

            const tasaBCV = parseFloat(localStorage.getItem('tasaBCV')) || 517.96;
            const porcentajeImpuesto = parseFloat(localStorage.getItem('porcentajeImpuesto')) || 0;

            let bloqueTotalesHtml = '';
            if (porcentajeImpuesto > 0) {
                const montoImpuesto = granTotal * (porcentajeImpuesto / 100);
                const granTotalConImpuesto = granTotal + montoImpuesto;
                const totalBs = granTotalConImpuesto * tasaBCV;
                bloqueTotalesHtml = `
                    <div class="bg-emerald-600 rounded-xl p-4 mt-6 shadow-lg space-y-1.5 text-right">
                        <div class="text-xs font-bold text-emerald-100 uppercase tracking-wider text-left border-b border-emerald-500/30 pb-1 mb-2">Resumen Financiero</div>
                        <div class="text-xs text-white flex justify-between"><span>Subtotal:</span> <span class="font-bold">$${granTotal.toFixed(2)} USD</span></div>
                        <div class="text-xs text-white flex justify-between"><span>Impuesto (${porcentajeImpuesto}%):</span> <span class="font-bold">+$${montoImpuesto.toFixed(2)} USD</span></div>
                        <div class="border-t border-emerald-500/40 my-1"></div>
                        <div class="text-base font-black text-white flex justify-between items-center"><span>TOTAL GENERAL:</span> <span class="text-xl">$${granTotalConImpuesto.toFixed(2)} USD</span></div>
                        <div class="text-xs font-bold text-emerald-100 text-right pt-1">Equivalente BCV: Bs. ${totalBs.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    </div>
                `;
            } else {
                const totalBs = granTotal * tasaBCV;
                bloqueTotalesHtml = `
                    <div class="bg-emerald-600 rounded-xl p-4 mt-6 shadow-lg space-y-1.5">
                        <div class="flex justify-between items-center text-white">
                            <span class="font-bold uppercase text-xs">Total General:</span>
                            <span class="font-bold text-xl">$${granTotal.toFixed(2)} USD</span>
                        </div>
                        <div class="text-emerald-100 text-xs border-t border-emerald-500/40 pt-2 text-right font-bold">Equivalente BCV: Bs. ${totalBs.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    </div>
                `;
            }

            tablaContainer.innerHTML = `
                ${htmlContenido}
                ${bloqueTotalesHtml}
                <div class="mt-6 bg-[#1F2937] p-4 rounded-xl border border-gray-600">
                    <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">Nota General</label>
                    <textarea id="observacionesGenerales" class="w-full bg-[#0F172A] border border-gray-600 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-emerald-500 outline-none" rows="3" placeholder="Escribe aquí las condiciones o notas generales..."></textarea>
                </div>
                <div class="flex gap-3 mt-6">
                    <button onclick="enviarWhatsApp()" class="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg text-sm transition-all active:scale-95">WhatsApp</button>
                    <button onclick="generarPDF()" class="flex-1 bg-sky-700 text-white font-bold py-3 rounded-xl shadow-lg text-sm transition-all active:scale-95">PDF Formal</button>
                </div>
                <div class="text-center mt-6 mb-20"><button onclick="vaciarPresupuesto()" class="text-rose-400 text-xs underline font-medium">Borrar todo</button></div>
            `;
        }

        function vaciarPresupuesto() {
            if (confirm('¿Seguro que quieres borrar todo el presupuesto?')) {
                localStorage.setItem('presupuestoActual', JSON.stringify([]));
                location.reload();
            }
        }

        function unidadLinter(uni) {
            if (!uni) return 'Global';
            const u = uni.toLowerCase().trim();
            if (u.includes('glob')) return 'Global';
            if (u.includes('m2') || u.includes('cuad')) return 'M2';
            if (u.includes('m3') || u.includes('cubi')) return 'M3';
            if (u.includes('lineal') || u.includes('ml')) return 'ML';
            if (u.includes('ptr') || u.includes('mtr') || u.includes('met')) return 'Metros';
            if (u.includes('pto') || u.includes('pun')) return 'Pto';
            if (u.includes('und') || u.includes('uni')) return 'Unid';
            if (u.includes('kg') || u.includes('kil')) return 'KG';
            return 'Global';
        }

        function enviarWhatsApp() {
            const presupuesto = JSON.parse(localStorage.getItem('presupuestoActual') || '[]');
            if (presupuesto.length === 0) return;
            const observaciones = document.getElementById('observacionesGenerales').value;
            const tasaBCV = parseFloat(localStorage.getItem('tasaBCV')) || 517.96;
            const porcentajeImpuesto = parseFloat(localStorage.getItem('porcentajeImpuesto')) || 0;
            let mensaje = "*PRESUPUESTO FORMAL*\n--------------------------------------\n\n";
            let granTotal = 0;
            presupuesto.forEach(p => {
                mensaje += `*• ${(p.modulo || 'SERVICIO').toUpperCase()}:*\n_${p.trabajo}_\n🔹 Cantidad: ${p.cantidad} ${unidadLinter(p.unidad)}\n🔹 Subtotal: $${parseFloat(p.totalUSD).toFixed(2)}\n\n`;
                granTotal += p.totalUSD;
            });
            mensaje += "--------------------------------------\n";
            if (porcentajeImpuesto > 0) {
                const totalConImp = granTotal + (granTotal * (porcentajeImpuesto / 100));
                mensaje += `*TOTAL GENERAL:* $${totalConImp.toFixed(2)} USD\n*Equivalente BCV:* Bs. ${(totalConImp * tasaBCV).toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}\n`;
            } else {
                mensaje += `*TOTAL GENERAL:* $${granTotal.toFixed(2)} USD\n*Equivalente BCV:* Bs. ${(granTotal * tasaBCV).toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}\n`;
            }
            if (observaciones) mensaje += "\n*Nota General:*\n_" + observaciones + "_\n";
            window.open(`https://wa.me/?text=${encodeURIComponent(mensaje + "\n_Generado por PresuMetrick._")}`, '_blank');
        }

        function generarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const presupuesto = JSON.parse(localStorage.getItem('presupuestoActual') || '[]');
            const observaciones = document.getElementById('observacionesGenerales').value;
            if (presupuesto.length === 0) { alert("No hay partidas"); return; }
            const cliente = prompt("Nombre del cliente:");
            if (!cliente) return;
            
            const logoBase64 = localStorage.getItem('logoEmpresa');
            if (logoBase64) { try { doc.addImage(logoBase64, 'JPEG', 15, 15, 25, 25); } catch (e) { } }
            
            doc.setFontSize(16); doc.setFont("helvetica", "bold"); doc.text((localStorage.getItem('nombreEmpresa') || "Profesional").toUpperCase(), 45, 22);
            doc.setFont("helvetica", "normal"); doc.setFontSize(9);
            doc.text("Dirección: " + (localStorage.getItem('direccionEmpresa') || "San Cristóbal, Táchira"), 45, 28);
            doc.text("RIF: " + (localStorage.getItem('rifEmpresa') || ""), 45, 33);
            doc.line(15, 48, 195, 48);

            let y = 65;
            doc.setFontSize(12); doc.setFont("helvetica", "bold"); doc.text("Presupuesto para: " + cliente, 15, 56);
            doc.setFontSize(10); doc.text("Descripcion", 15, y); doc.text("Total", 170, y);
            doc.line(15, y + 2, 195, y + 2);
            y += 10;

            let subtotalUSD = 0;
            presupuesto.forEach((p) => {
                if (y > 250) { doc.addPage(); y = 20; }
                
                // MÓDULO (Negrita)
                doc.setFont("helvetica", "bold"); doc.setFontSize(9);
                doc.text(p.modulo.toUpperCase(), 15, y);
                y += 5;

                // EQUIPO + DESCRIPCIÓN (Normal)
                doc.setFont("helvetica", "normal"); doc.setFontSize(10);
                const splitTexto = doc.splitTextToSize(p.trabajo, 145);
                doc.text(splitTexto, 15, y);
                doc.setFont("helvetica", "bold");
                doc.text("$" + p.totalUSD.toFixed(2), 170, y);
                
                y += (splitTexto.length * 5) + 3;
                doc.setFont("helvetica", "normal"); doc.setFontSize(8);
                doc.text(`Cantidad: ${p.cantidad} ${unidadLinter(p.unidad)} | Precio Unitario: $${parseFloat(p.precioUnitario).toFixed(2)}`, 15, y);
                
                subtotalUSD += p.totalUSD;
                y += 12;
            });

            y += 10;
            const tasaBCV = parseFloat(localStorage.getItem('tasaBCV')) || 517.96;
            const porcentajeImpuesto = parseFloat(localStorage.getItem('porcentajeImpuesto')) || 0;
            const granTotal = subtotalUSD + (subtotalUSD * (porcentajeImpuesto / 100));
            doc.setFont("helvetica", "bold");
            doc.text(`TOTAL GENERAL: $${granTotal.toFixed(2)} USD`, 120, y);
            doc.text(`Equivalente BCV: Bs. ${(granTotal * tasaBCV).toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`, 120, y + 6);
            
            if (observaciones) {
                doc.text("Nota General:", 15, y + 20);
                doc.setFont("helvetica", "normal");
                doc.text(doc.splitTextToSize(observaciones, 180), 15, y + 26);
            }
            doc.save(`Presupuesto_${cliente.replace(/\s+/g, '_')}.pdf`);
        }
    </script>
</body>
</html>
