<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresuMetrick - Albañilería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans selection:bg-amber-500 selection:text-slate-900">

    <header class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-800 px-4 py-4 flex items-center justify-between shadow-lg">
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-slate-400 hover:text-amber-500 transition-colors p-1">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </a>
            <h1 class="text-xl font-bold tracking-tight text-amber-500"><i class="fa-solid fa-trowel-bricks mr-1"></i> Albañilería</h1>
        </div>
    </header>

    <main class="flex-1 p-4 max-w-md mx-auto w-full space-y-6 pb-24">
        
        <div class="bg-slate-800/50 border border-slate-800 rounded-2xl p-4 shadow-md">
            <p class="text-sm text-slate-400 leading-relaxed">
                Registra trabajos de construcción, frisos, colocación de bloques, pisos o revestimientos para generar el cómputo métrico automáticamente.
            </p>
        </div>

        <div class="bg-slate-800/80 border border-slate-700/50 rounded-2xl p-5 shadow-xl space-y-4">
            <h2 class="text-base font-semibold text-slate-200 border-b border-slate-700 pb-2 flex items-center">
                <i class="fa-solid fa-calculator text-amber-500 mr-2"></i>Nuevo Concepto
            </h2>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Tipo de Trabajo</label>
                <select id="tipo-trabajo" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
                    <option>Construcción de Pared de Bloques</option>
                    <option>Friso Liso en Pared / Techo</option>
                    <option>Instalación de Cerámica / Porcelanato</option>
                    <option>Vaciado de Piso / Soportes</option>
                    <option>Remoción / Demolición de Elementos</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Cantidad</label>
                    <input type="number" id="cantidad-input" step="0.01" placeholder="0" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
                </div>
                <div class="space-y-1.5">
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Unidad</label>
                    <select id="unidad-select" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
                        <option value="M2">Metros Cuadrados (M2)</option>
                        <option value="M3">Metros Cúbicos (M3)</option>
                        <option value="Mtrs">Metros Lineales (Mtrs)</option>
                        <option value="Unid">Unid (Unidades)</option>
                        <option value="Global">Global (Global)</option>
                    </select>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Precio Unitario ($)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 text-sm">$</span>
                    <input type="number" id="precio-input" step="0.01" placeholder="0.00" class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-8 pr-3 py-3 text-sm text-slate-200 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Descripción o Notas</label>
                <textarea id="descripcion-nota" rows="2" placeholder="Ej: Incluye acarreo de materiales..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all resize-none"></textarea>
            </div>

            <button type="button" onclick="guardarPartida()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-3.5 rounded-xl transition-all active:scale-[0.98]">
                <i class="fa-solid fa-plus mr-2"></i> Agregar al Presupuesto
            </button>
        </div>
    </main>

    <script>
        function guardarPartida() {
            const tipoTrabajo = document.getElementById('tipo-trabajo').value; 
            const cantidad = parseFloat(document.getElementById('cantidad-input').value) || 0;
            const precioUnitario = parseFloat(document.getElementById('precio-input').value) || 0;
            const unidadSeleccionada = document.getElementById('unidad-select').value;
            const descripcionAdicional = document.getElementById('descripcion-nota').value.trim();

            if (cantidad <= 0 || precioUnitario <= 0) {
                alert('Por favor, ingresa una cantidad y un precio unitario válidos.');
                return;
            }

            const totalUSD = cantidad * precioUnitario;

            const nuevaPartida = {
                modulo: 'Albañilería',
                trabajo: tipoTrabajo,
                cantidad: cantidad,
                unidad: unidadSeleccionada, // Guardará directamente "M2", "M3", etc.
                precioUnitario: precioUnitario,
                totalUSD: totalUSD,
                nota: descripcionAdicional
            };

            let presupuesto = JSON.parse(localStorage.getItem('presupuestoActual')) || [];
            presupuesto.push(nuevaPartida);
            localStorage.setItem('presupuestoActual', JSON.stringify(presupuesto));

            document.getElementById('cantidad-input').value = "";
            document.getElementById('precio-input').value = "";
            document.getElementById('descripcion-nota').value = "";

            alert('¡Partida agregada al presupuesto con éxito!');
        }
    </script>
</body>
</html>
